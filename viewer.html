    <!-- Twitter Card -->

    <meta name="twitter:title" content="監票實況｜石門國小第29屆自治市市長選舉">
    <meta name="twitter:description" content="全校班級即時監票畫面 — 6 位候選人票數同步、領先變動通知。">
    <meta name="twitter:image" content="https://cagoooo.github.io/Little-Mayer/assets/og-preview.png?v=1.0.22">

    <link rel="canonical" href="https://cagoooo.github.io/Little-Mayer/viewer.html">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, -apple-system, "Microsoft JhengHei", sans-serif; }
        [x-cloak] { display: none !important; }

        /* 即時連線小燈 pulse */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
            70% { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
            100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        }
        .live-dot { animation: pulse-ring 2s infinite; }

        /* 票數變動：卡片藍色光暈 */
        @keyframes vote-glow {
            0%   { box-shadow: 0 0 0 0   rgba(59,130,246,0); }
            30%  { box-shadow: 0 0 0 12px rgba(59,130,246,0.55); }
            100% { box-shadow: 0 0 0 0   rgba(59,130,246,0); }
        }
        .vote-glow { animation: vote-glow 1s ease-out; }

        /* 票數數字跳動 */
        @keyframes num-pop {
            0%   { transform: scale(1);    color: inherit; }
            40%  { transform: scale(1.45); color: #16a34a; text-shadow: 0 4px 24px rgba(22,163,74,.5); }
            100% { transform: scale(1);    color: inherit; }
        }
        .num-pop { animation: num-pop .55s cubic-bezier(.4,0,.2,1); }

        /* +N 飄字 */
        @keyframes float-up {
            0%   { transform: translate(-50%, 0)     scale(1);   opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(1.5); opacity: 0; }
        }
        .float-plus {
            position: absolute; left: 50%; bottom: 30%;
            color: #16a34a; font-size: 28px; font-weight: 900;
            text-shadow: 0 2px 8px rgba(22,163,74,.4);
            pointer-events: none; z-index: 30;
            animation: float-up 1s cubic-bezier(.4,0,.2,1) forwards;
        }

        /* 領先者皇冠脈衝 */
        @keyframes crown-shine {
            0%, 100% { transform: scale(1)    rotate(0);     filter: drop-shadow(0 0 6px gold); }
            50%      { transform: scale(1.15) rotate(-5deg); filter: drop-shadow(0 0 14px gold); }
        }
        .crown-shine { animation: crown-shine 1.6s ease-in-out infinite; }

        /* 第一名排名徽章常駐金光脈衝 */
        @keyframes rank-pulse {
            0%, 100% { box-shadow: 0 0 0 0   rgba(250,204,21,.6); }
            50%      { box-shadow: 0 0 0 10px rgba(250,204,21,0); }
        }
        .rank-pulse { animation: rank-pulse 1.8s ease-in-out infinite; }

        /* 領先變動：新領先者大金光 */
        @keyframes leader-burst {
            0%   { transform: scale(1);    box-shadow: 0 0 0 0   rgba(250,204,21,0); }
            30%  { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(250,204,21,0.7); }
            100% { transform: scale(1);    box-shadow: 0 0 0 0   rgba(250,204,21,0); }
        }
        .leader-burst { animation: leader-burst 1.6s cubic-bezier(.4,0,.2,1); }

        /* 被超越者：輕震動 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake .5s ease-in-out; }

        /* 進度條漸變 */
        .bar-fill { transition: width .6s cubic-bezier(.4,0,.2,1); }

        /* 領先變動全螢幕 toast */
        @keyframes toast-pop {
            0%   { transform: translate(-50%,-50%) scale(.6); opacity: 0; }
            15%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
            25%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
            85%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(.9);  opacity: 0; }
        }
        .leader-toast {
            position: fixed; left: 50%; top: 50%;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: #fff; font-size: 32px; font-weight: 900;
            padding: 24px 56px; border-radius: 24px;
            box-shadow: 0 24px 64px rgba(0,0,0,.4);
            z-index: 9999; pointer-events: none;
            animation: toast-pop 3s cubic-bezier(.4,0,.2,1) forwards;
            white-space: nowrap;
        }
        .leader-toast .emoji { font-size: 40px; }

        /* 卡片 hover 微互動 */
        .card-elev { transition: transform .25s ease; }
        .card-elev:hover { transform: translateY(-3px); }

        /* 倒數 banner 呼吸光暈 */
        @keyframes countdown-breath {
            0%, 100% { box-shadow: 0 8px 32px rgba(139, 92, 246, 0.35); }
            50%      { box-shadow: 0 8px 48px rgba(139, 92, 246, 0.65); }
        }
        .countdown-glow { animation: countdown-breath 2.5s ease-in-out infinite; }

        /* 倒數數字最後 10 秒緊張閃爍 */
        @keyframes urgent-flash {
            0%, 100% { color: #fff;       text-shadow: 0 0 16px rgba(252, 165, 165, 0.6); }
            50%      { color: #fecaca;    text-shadow: 0 0 28px rgba(254, 202, 202, 1); }
        }
        .urgent-flash { animation: urgent-flash .7s ease-in-out infinite; }

        /* LIVE 紅點脈衝（吸引注意，呼吸式擴張） */
        @keyframes live-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.8); }
            70%  { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }
        .live-pulse { animation: live-pulse 1.4s infinite; }
        @keyframes live-blink {
            0%, 100% { opacity: 1; }
            50%      { opacity: .35; }
        }
        .live-blink-text { animation: live-blink 1.4s infinite; }

        /* ============= 開票完成公告畫面 ============= */
        @keyframes celebration-fade-in {
            0%   { opacity: 0; }
            100% { opacity: 1; }
        }
        .celebration-overlay { animation: celebration-fade-in .5s ease-out; }

        @keyframes title-zoom-in {
            0%   { transform: scale(0.5) translateY(-30px); opacity: 0; }
            50%  { transform: scale(1.1) translateY(0);     opacity: 1; }
            100% { transform: scale(1)   translateY(0);     opacity: 1; }
        }
        .celebration-title { animation: title-zoom-in .9s cubic-bezier(.4,0,.2,1) .2s both; }

        @keyframes winner-card-rise {
            0%   { transform: translateY(80px) scale(0.85); opacity: 0; }
            100% { transform: translateY(0)    scale(1);    opacity: 1; }
        }
        .winner-card { animation: winner-card-rise .8s cubic-bezier(.4,0,.2,1) .7s both; }

        /* 金光呼吸（當選人頭像周圍） */
        @keyframes winner-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(250,204,21,.7), 0 24px 64px rgba(250,204,21,.4); }
            50%      { box-shadow: 0 0 0 24px rgba(250,204,21,0), 0 32px 80px rgba(250,204,21,.6); }
        }
        .winner-photo { animation: winner-glow 2s ease-in-out infinite; }

        /* 「🏆 當選」徽章彈跳 */
        @keyframes badge-bounce {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50%      { transform: rotate(-10deg) scale(1.08); }
        }
        .winner-badge { animation: badge-bounce 1.5s ease-in-out infinite; }

        /* 五彩 Confetti 從上方落下旋轉 */
        @keyframes confetti-fall {
            0%   { transform: translateY(-50px) rotate(0deg);    opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg);  opacity: .9; }
        }
        .confetti-piece {
            position: fixed;
            top: -20px;
            width: 12px;
            height: 18px;
            pointer-events: none;
            z-index: 10000;
            animation: confetti-fall linear forwards;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col" x-data="viewerApp()" x-init="init()" x-cloak>

    <!-- 頂部標題列（縮減高度，騰空間給卡片） -->
    <header class="bg-gradient-to-r from-blue-700 to-indigo-700 text-white shadow-lg sticky top-0 z-20">
        <div class="max-w-[1600px] mx-auto px-4 py-2.5 flex flex-wrap justify-between items-center gap-2">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-tv text-xl"></i>
                <div>
                    <h1 class="text-base md:text-lg font-bold leading-tight" x-text="meta.title"></h1>
                    <p class="text-blue-100 text-xs leading-tight" x-text="meta.subtitle"></p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1.5 bg-white/15 backdrop-blur px-2.5 py-1 rounded-full text-xs">
                    <span class="w-2 h-2 rounded-full live-dot" :class="connected ? 'bg-emerald-400' : 'bg-rose-400'"></span>
                    <span x-text="connected ? '即時' : '中斷'"></span>
                </div>
                <div x-show="meta.locked" class="bg-amber-500 text-white px-2.5 py-1 rounded-full text-xs font-medium">
                    <i class="fa-solid fa-lock mr-0.5"></i> 已封存
                </div>
                <!-- 並列領先指示 -->
                <div x-show="leaderCandidates.length > 1" class="bg-gradient-to-r from-orange-500 to-rose-500 text-white px-2.5 py-1 rounded-full text-xs font-bold shadow flex items-center gap-1">
                    <i class="fa-solid fa-scale-balanced"></i>
                    <span x-text="`${leaderCandidates.length} 人並列領先`"></span>
                </div>
                <!-- 開票現場直播按鈕 -->
                <button x-show="meta.liveVideoUrl"
                        @click="openLiveModal()"
                        class="live-pulse bg-red-600 hover:bg-red-700 text-white text-xs px-2.5 py-1 rounded-full font-bold flex items-center gap-1.5 shadow"
                        title="觀看開票現場直播">
                    <span class="w-2 h-2 rounded-full bg-white live-blink-text"></span>
                    <span class="live-blink-text">LIVE</span>
                    <span class="hidden sm:inline">開票直播</span>
                </button>
                <!-- 選舉注意事項按鈕 -->
                <button x-show="meta.noticeVideoUrl"
                        @click="openNoticeModal()"
                        class="bg-amber-500 hover:bg-amber-600 text-white text-xs px-2.5 py-1 rounded-full font-medium flex items-center gap-1 shadow"
                        title="觀看選舉注意事項影片">
                    <i class="fa-solid fa-circle-info"></i>
                    <span class="hidden sm:inline">注意事項</span>
                </button>
                <!-- 靜音切換 -->
                <button @click="toggleMute()"
                        class="bg-white/15 hover:bg-white/25 text-white text-xs px-2.5 py-1 rounded-full"
                        :title="muted ? '目前靜音，點擊恢復音效' : '目前有音效，點擊靜音'">
                    <i class="fa-solid" :class="muted ? 'fa-volume-xmark' : 'fa-volume-high'"></i>
                </button>
                <!-- 全螢幕切換 -->
                <button @click="toggleFullscreen()"
                        class="bg-white/15 hover:bg-white/25 text-white text-xs px-2.5 py-1 rounded-full"
                        :title="isFullscreen ? '退出全螢幕 (Esc)' : '進入全螢幕模式'">
                    <i class="fa-solid" :class="isFullscreen ? 'fa-compress' : 'fa-expand'"></i>
                </button>
                <a href="index.html" class="text-white/80 hover:text-white text-xs hidden sm:inline">
                    <i class="fa-solid fa-house mr-0.5"></i> 主頁
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-[1600px] mx-auto w-full px-3 lg:px-4 py-3 flex flex-col gap-3">

        <!-- 載入錯誤 -->
        <div x-show="loadError" class="bg-rose-50 border border-rose-200 text-rose-800 p-4 rounded-xl text-sm">
            <i class="fa-solid fa-triangle-exclamation mr-2"></i>
            <span x-text="loadError"></span>
        </div>

        <!-- 倒數開票 banner -->
        <div x-show="countdownState === 'pending'"
             class="countdown-glow bg-gradient-to-r from-violet-600 via-purple-600 to-fuchsia-600 text-white rounded-2xl shadow-xl px-5 py-4 lg:py-5 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-stopwatch text-3xl lg:text-4xl"></i>
                <div class="leading-tight">
                    <div class="text-[11px] lg:text-xs opacity-90 font-medium uppercase tracking-widest">距離開票還有</div>
                    <div class="text-sm lg:text-base font-bold mt-0.5" x-text="`預定開票時間：${formatOpenAt(meta.openAt)}`"></div>
                </div>
            </div>
            <div class="tabular-nums font-black text-4xl lg:text-6xl xl:text-7xl tracking-wide"
                 :class="{ 'urgent-flash': countdownRemaining > 0 && countdownRemaining <= 10000 }"
                 x-text="countdownStr"></div>
        </div>

        <!-- 統計列 -->
        <div class="grid grid-cols-4 gap-2 lg:gap-3">
            <div class="bg-white rounded-xl shadow-sm px-3 py-2 border-l-4 border-blue-500">
                <div class="text-[10px] lg:text-xs text-slate-500 font-medium uppercase tracking-wider">總投票數</div>
                <div class="text-2xl lg:text-3xl font-black text-slate-800 tabular-nums leading-tight" x-text="totalVotes.toLocaleString()"></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm px-3 py-2 border-l-4 border-emerald-500">
                <div class="text-[10px] lg:text-xs text-slate-500 font-medium uppercase tracking-wider">候選人數</div>
                <div class="text-2xl lg:text-3xl font-black text-slate-800 tabular-nums leading-tight" x-text="candidates.length"></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm px-3 py-2 border-l-4 border-amber-500">
                <div class="text-[10px] lg:text-xs text-slate-500 font-medium uppercase tracking-wider">最高票</div>
                <div class="text-2xl lg:text-3xl font-black text-amber-600 tabular-nums leading-tight" x-text="maxVotes.toLocaleString()"></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm px-3 py-2 border-l-4 border-rose-500">
                <div class="text-[10px] lg:text-xs text-slate-500 font-medium uppercase tracking-wider">最後更新</div>
                <div class="text-base lg:text-lg font-bold text-slate-800 leading-tight tabular-nums" x-text="lastUpdate || '—'"></div>
            </div>
        </div>

        <!-- 候選人卡片網格：手機 2 欄、平板 3 欄、桌機 6 欄一排 -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2 lg:gap-3 flex-grow">
            <template x-for="(c, idx) in sortedCandidates" :key="c.id">
                <div class="card-elev bg-white rounded-2xl shadow-md overflow-hidden flex flex-col relative cursor-pointer"
                     @click="openCandidateModal(c)"
                     :id="'card-' + c.id"
                     :class="{ 'ring-4 ring-yellow-400 ring-offset-2': isLeader(c) }">

                    <!-- 排名圈（左上）— 同票同名次（dense ranking） -->
                    <div class="absolute top-2 left-2 z-10 rounded-full flex items-center justify-center font-black shadow-xl ring-2 ring-white"
                         :class="rankBadgeClass(c)">
                        <span x-text="rankLabel(c)" :class="rankTextClass(c)"></span>
                    </div>

                    <!-- 並列標籤（同票 ≥2 人時顯示） -->
                    <div x-show="rankTieCount(c) > 1 && c.votes > 0"
                         class="absolute top-2 left-1/2 -translate-x-1/2 z-10 bg-gradient-to-r from-orange-500 to-rose-500 text-white px-2 py-0.5 rounded-md text-[10px] lg:text-xs font-bold shadow-md whitespace-nowrap">
                        <i class="fa-solid fa-scale-balanced mr-0.5"></i>
                        <span x-text="`並列${rankTieCount(c)}人`"></span>
                    </div>

                    <!-- 領先者皇冠（並列也都顯示） -->
                    <div x-show="isLeader(c)"
                         class="absolute -top-2 right-1/2 translate-x-[60%] z-20 text-2xl crown-shine">
                        👑
                    </div>

                    <!-- 候選人號碼（右上）— 漸層大徽章 -->
                    <div class="absolute top-2 right-2 z-10 bg-gradient-to-br from-blue-500 to-blue-700 text-white px-2.5 py-1 lg:px-3 lg:py-1.5 rounded-xl shadow-lg ring-2 ring-white flex items-baseline gap-0.5">
                        <span class="text-xl lg:text-2xl font-black leading-none tabular-nums" x-text="c.id"></span>
                        <span class="text-[10px] lg:text-xs font-bold opacity-90">號</span>
                    </div>

                    <!-- 照片區：固定 aspect-square -->
                    <div class="relative bg-gradient-to-b from-slate-100 to-slate-200 aspect-square overflow-hidden">
                        <template x-if="c.imageUrl">
                            <img :src="c.imageUrl" :alt="c.name"
                                 class="w-full h-full object-cover"
                                 @error="$el.style.display='none'">
                        </template>
                        <template x-if="!c.imageUrl">
                            <div class="w-full h-full flex items-center justify-center">
                                <i class="fa-solid fa-user text-slate-400 text-5xl"></i>
                            </div>
                        </template>
                    </div>

                    <!-- 姓名 + 票數 + 得票率 -->
                    <div class="p-3 lg:p-4 flex flex-col gap-3 lg:gap-4 flex-grow">

                        <!-- 姓名（大字） -->
                        <h3 class="text-xl lg:text-2xl xl:text-3xl font-black text-slate-800 text-center truncate tracking-wide"
                            x-text="c.name"></h3>

                        <!-- 票數區塊（超大主視覺） -->
                        <div class="text-center flex-grow flex flex-col justify-center">
                            <div class="text-xs lg:text-sm text-slate-500 font-bold uppercase tracking-widest mb-1">得票</div>
                            <div class="text-6xl lg:text-7xl xl:text-8xl font-black text-blue-600 tabular-nums leading-none"
                                 :id="'num-' + c.id"
                                 x-text="c.votes.toLocaleString()"></div>
                        </div>

                        <!-- 得票率徽章 + 進度條 -->
                        <div class="space-y-2">
                            <div class="flex items-baseline justify-center gap-1">
                                <span class="text-2xl lg:text-3xl font-black tabular-nums"
                                      :class="rankPercentTextColor(c)"
                                      x-text="percentage(c.votes)"></span>
                                <span class="text-base lg:text-lg font-bold text-slate-500">%</span>
                            </div>
                            <div class="w-full bg-slate-100 h-2.5 lg:h-3 rounded-full overflow-hidden">
                                <div class="h-full rounded-full bar-fill"
                                     :class="rankBarColor(c)"
                                     :style="`width: ${maxVotes > 0 ? (c.votes / maxVotes) * 100 : 0}%`"></div>
                            </div>

                            <!-- 點擊提示 -->
                            <div class="text-[10px] lg:text-xs text-blue-500 font-medium text-center -mb-1 mt-1 flex items-center justify-center gap-1">
                                <i class="fa-solid fa-hand-pointer"></i>
                                <span>點此看政見</span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- ============= 候選人政見 Modal ============= -->
    <div x-show="modalCandidate"
         x-transition.opacity
         class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[100] flex items-center justify-center p-3 lg:p-6"
         @click="closeCandidateModal()"
         @keydown.escape.window="closeCandidateModal()">
        <template x-if="modalCandidate">
            <div class="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[92vh] overflow-y-auto"
                 @click.stop>
                <!-- Modal 頂部：照片 + 號碼 + 姓名 -->
                <div class="relative bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-700 text-white p-5 lg:p-7">
                    <button @click="closeCandidateModal()"
                            class="absolute top-3 right-3 w-9 h-9 rounded-full bg-white/15 hover:bg-white/30 flex items-center justify-center transition-colors text-lg"

    <!-- Module 必須在 Alpine 之前載入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
        import { firebaseConfig, DEFAULT_CANDIDATES, DEFAULT_META } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.viewerApp = function () {
            return {
                candidates: [],
                meta: { ...DEFAULT_META },
                connected: false,
                loadError: null,
                lastUpdate: '',
                muted: localStorage.getItem('lm_muted') === '1',
                isFullscreen: false,
                now: Date.now(),
                modalCandidate: null,
                noticeOpen: false,
                liveOpen: false,
                celebrationOpen: false,
                celebrationWinners: [],
                _prevVotes: {},
                _prevLeaderKey: '',
                _firstLoad: true,
                _lastCountdownState: 'unknown',
                _lastCelebrateAt: 0,

                init() {
                    onValue(ref(db, '.info/connected'), (snap) => {
                        this.connected = snap.val() === true;
                    });

                    // 同步全螢幕狀態（使用者按 Esc 退出時也能更新）
                    document.addEventListener('fullscreenchange', () => {
                        this.isFullscreen = !!document.fullscreenElement;
                    });

                    // 倒數 tick：每秒更新 now，並偵測 pending → live 的瞬間
                    this._tickTimer = setInterval(() => {
                        this.now = Date.now();
                        const cur = this.countdownState;
                        if (this._lastCountdownState === 'pending' && cur === 'live') {
                            this.fireOpenMoment();
                        }
                        this._lastCountdownState = cur;
                    }, 1000);

                    onValue(ref(db, 'election/candidates'), (snap) => {
                        const v = snap.val();
                        if (!v) {
                            this.candidates = DEFAULT_CANDIDATES.map(c => ({ ...c }));
                        } else {
                            this.candidates = Object.values(v)
                                .map(c => ({
                                    id: Number(c.id),
                                    name: c.name || '',
                                    imageUrl: c.imageUrl || '',
                                    votes: Number(c.votes) || 0,
                                    bio: c.bio || '',
                                    policies: c.policies || '',
                                    videoUrl: c.videoUrl || ''
                                }))
                                .sort((a, b) => a.id - b.id);

                            // 若 modal 開啟中，同步更新該候選人最新資料（票數會即時跳）
                            if (this.modalCandidate) {
                                const fresh = this.candidates.find(c => c.id === this.modalCandidate.id);
                                if (fresh) this.modalCandidate = fresh;
                            }
                        }
                        this.handleVoteChange();
                        this.lastUpdate = new Date().toLocaleTimeString('zh-TW', { hour12: false });
                    }, (err) => {
                        this.loadError = err.message + '（請確認 firebase-config.js 已正確設定）';
                    });

                    onValue(ref(db, 'election/meta'), (snap) => {
                        const v = snap.val();
                        if (v) {
                            this.meta = { ...DEFAULT_META, ...v };
                            this.maybeTriggerCelebration();
                        }
                    });
                },

                handleVoteChange() {
                    this.$nextTick(() => {
                        const changedIds = [];
                        for (const c of this.candidates) {
                            const prev = this._prevVotes[c.id];
                            if (prev !== undefined && prev !== c.votes) {
                                changedIds.push({ id: c.id, delta: c.votes - prev });
                            }
                            this._prevVotes[c.id] = c.votes;
                        }

                        if (!this._firstLoad) {
                            for (const ch of changedIds) {
                                this.flashCard(ch.id, ch.delta);
                            }
                        }

                        // 偵測領先（並列也算）變動
                        const leaders = this.leaderCandidates;
                        const newKey = leaders.map(c => c.id).sort((a,b)=>a-b).join(',');

                        if (!this._firstLoad && this._prevLeaderKey && newKey !== this._prevLeaderKey) {
                            this.fireLeaderChange(this._prevLeaderKey, leaders);
                        }
                        this._prevLeaderKey = newKey;
                        this._firstLoad = false;
                    });
                },

                flashCard(id, delta) {
                    const card = document.getElementById('card-' + id);
                    const num = document.getElementById('num-' + id);
                    if (card) {
                        card.classList.remove('vote-glow');
                        void card.offsetWidth;
                        card.classList.add('vote-glow');
                    }
                    if (num) {
                        num.classList.remove('num-pop');
                        void num.offsetWidth;
                        num.classList.add('num-pop');
                    }
                    if (card && delta > 0) {
                        const float = document.createElement('div');
                        float.className = 'float-plus';
                        float.textContent = '+' + delta;
                        card.appendChild(float);
                        setTimeout(() => float.remove(), 1100);
                    }

                    // 票數變動音效（throttle 200ms 防爆音）
                    if (window.lmSound) {
                        const now = Date.now();
                        if (!this._lastSoundAt || now - this._lastSoundAt > 200) {
                            delta > 0 ? window.lmSound.voteAdd() : window.lmSound.voteSub();
                            this._lastSoundAt = now;
                        }
                    }
                },

                fireLeaderChange(prevKey, newLeaders) {
                    if (newLeaders.length === 0) return;

                    const prevIds = prevKey ? prevKey.split(',').map(Number) : [];
                    const newIds = newLeaders.map(c => c.id);

                    // 判斷情境
                    let icon, mainText, subText;
                    const votes = newLeaders[0].votes;

                    if (newLeaders.length === 1) {
                        // 單人領先
                        const leader = newLeaders[0];
                        if (prevIds.length > 1) {
                            icon = '👑';
                            mainText = `${leader.id} 號 ${leader.name} 反超取得單獨領先！`;
                        } else {
                            icon = '👑';
                            mainText = `${leader.id} 號 ${leader.name} 取得領先！`;
                        }
                        subText = `${votes} 票`;
                    } else {
                        // 多人並列
                        icon = '⚖️';
                        const names = newLeaders.map(c => `${c.id}號 ${c.name}`).join('、');
                        mainText = `${newLeaders.length} 人並列領先`;
                        subText = `${names}（各 ${votes} 票）`;
                    }

                    const toast = document.createElement('div');
                    toast.className = 'leader-toast';
                    toast.innerHTML = `
                        <span class="emoji">${icon}</span>
                        <div style="display:flex;flex-direction:column;align-items:flex-start;gap:4px;">
                            <span>${mainText}</span>
                            <span style="font-size:18px;font-weight:600;opacity:.9;">${subText}</span>
                        </div>
                    `;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 3100);

                    // 音效
                    if (window.lmSound) {
                        if (newLeaders.length > 1) window.lmSound.tieAlert();
                        else                       window.lmSound.leaderChange();
                    }

                    setTimeout(() => {
                        // 新領先者卡片金光爆炸
                        for (const id of newIds) {
                            const card = document.getElementById('card-' + id);
                            if (card) {
                                card.classList.remove('leader-burst');
                                void card.offsetWidth;
                                card.classList.add('leader-burst');
                            }
                        }
                        // 失去領先地位者震動
                        for (const id of prevIds) {
                            if (newIds.includes(id)) continue;
                            const oldCard = document.getElementById('card-' + id);
                            if (oldCard) {
                                oldCard.classList.remove('shake');
                                void oldCard.offsetWidth;
                                oldCard.classList.add('shake');
                            }
                        }
                    }, 100);
                },

                // 倒數計算
                get openAtMs() {
                    if (!this.meta.openAt) return null;
                    const t = new Date(this.meta.openAt).getTime();
                    return isNaN(t) ? null : t;
                },
                get countdownRemaining() {
                    if (this.openAtMs === null) return -1;
                    return Math.max(0, this.openAtMs - this.now);
                },
                get countdownState() {
                    if (this.openAtMs === null) return 'none';
                    return this.countdownRemaining > 0 ? 'pending' : 'live';
                },
                get countdownStr() {
                    const ms = this.countdownRemaining;
                    if (ms < 0) return '';
                    const s = Math.ceil(ms / 1000);
                    const hh = Math.floor(s / 3600);
                    const mm = Math.floor((s % 3600) / 60);
                    const ss = s % 60;
                    const pad = n => String(n).padStart(2, '0');
                    return hh > 0 ? `${pad(hh)}:${pad(mm)}:${pad(ss)}` : `${pad(mm)}:${pad(ss)}`;
                },
                formatOpenAt(s) {
                    if (!s) return '';
                    const t = new Date(s);
                    if (isNaN(t.getTime())) return '';
                    const pad = n => String(n).padStart(2, '0');
                    return `${t.getMonth()+1}/${t.getDate()} ${pad(t.getHours())}:${pad(t.getMinutes())}`;
                },

                fireOpenMoment() {
                    // 全螢幕大 toast 「🔔 開票時間到」
                    const toast = document.createElement('div');
                    toast.className = 'leader-toast';
                    toast.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    toast.innerHTML = `
                        <span class="emoji">🔔</span>
                        <div style="display:flex;flex-direction:column;align-items:flex-start;gap:4px;">
                            <span>開票時間到！</span>
                            <span style="font-size:18px;font-weight:600;opacity:.9;">LIVE 開票進行中</span>
                        </div>
                    `;
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 3100);

                    // 播 leaderChange 上升和弦音
                    if (window.lmSound) window.lmSound.leaderChange();
                },

                get totalVotes() {
                    return this.candidates.reduce((s, c) => s + c.votes, 0);
                },
                get maxVotes() {
                    return this.candidates.length ? Math.max(...this.candidates.map(c => c.votes)) : 0;
                },
                get sortedCandidates() {
                    // 顯示順序：票數高→低，相同則 id 小→大（穩定排序）
                    return [...this.candidates].sort((a, b) => {
                        if (b.votes !== a.votes) return b.votes - a.votes;
                        return a.id - b.id;
                    });
                },
                // dense ranking：相同票數同名次。例：[23,23,20,12] → [1,1,2,3]
                // 0 票回傳 null（不參與排名）
                get rankMap() {
                    const distinct = [...new Set(
                        this.candidates.filter(c => c.votes > 0).map(c => c.votes)
                    )].sort((a, b) => b - a);
                    const map = {};
                    for (const c of this.candidates) {
                        map[c.id] = c.votes === 0 ? null : distinct.indexOf(c.votes) + 1;
                    }
                    return map;
                },
                // 各名次有幾人並列
                get tieCountByRank() {
                    const counts = {};
                    for (const c of this.candidates) {
                        const r = this.rankMap[c.id];
                        if (r === null) continue;
                        counts[r] = (counts[r] || 0) + 1;
                    }
                    return counts;
                },
                // 並列領先（rank == 1）的所有候選人
                get leaderCandidates() {
                    return this.candidates
                        .filter(c => this.rankMap[c.id] === 1)
                        .sort((a, b) => a.id - b.id);
                },
                rankOf(c)        { return this.rankMap[c.id]; },
                rankTieCount(c)  { const r = this.rankMap[c.id]; return r ? this.tieCountByRank[r] : 0; },
                isLeader(c)      { return this.rankMap[c.id] === 1; },

                percentage(v) {
                    if (this.totalVotes === 0) return '0.0';
                    return (v * 100 / this.totalVotes).toFixed(1);
                },
                rankLabel(c) {
                    const r = this.rankOf(c);
                    if (r === null) return '—';
                    return ['🥇', '🥈', '🥉'][r - 1] || r;
                },
                rankBadgeClass(c) {
                    const r = this.rankOf(c);
                    if (r === null) return 'w-12 h-12 lg:w-14 lg:h-14 bg-slate-400';
                    if (r === 1)    return 'w-14 h-14 lg:w-16 lg:h-16 bg-gradient-to-br from-yellow-300 via-yellow-400 to-amber-500 rank-pulse';
                    if (r === 2)    return 'w-12 h-12 lg:w-14 lg:h-14 bg-gradient-to-br from-slate-200 via-slate-300 to-slate-400';
                    if (r === 3)    return 'w-12 h-12 lg:w-14 lg:h-14 bg-gradient-to-br from-amber-400 via-amber-600 to-amber-800';
                    return 'w-11 h-11 lg:w-12 lg:h-12 bg-gradient-to-br from-slate-500 to-slate-700';
                },
                rankTextClass(c) {
                    const r = this.rankOf(c);
                    if (r === null) return 'text-xl lg:text-2xl text-white opacity-80';
                    if (r <= 3)     return 'text-2xl lg:text-3xl drop-shadow';
                    return 'text-xl lg:text-2xl text-white';
                },
                rankBarColor(c) {
                    const r = this.rankOf(c);
                    if (r === null) return 'bg-slate-300';
                    if (r === 1) return 'bg-gradient-to-r from-yellow-400 to-yellow-500';
                    if (r === 2) return 'bg-gradient-to-r from-slate-400 to-slate-500';
                    if (r === 3) return 'bg-gradient-to-r from-amber-600 to-amber-700';
                    return 'bg-gradient-to-r from-blue-400 to-blue-600';
                },
                rankPercentTextColor(c) {
                    const r = this.rankOf(c);
                    if (r === null) return 'text-slate-400';
                    if (r === 1) return 'text-amber-600';
                    if (r === 2) return 'text-slate-600';
                    if (r === 3) return 'text-amber-700';
                    return 'text-blue-600';
                },
                toggleMute() {
                    if (window.lmSound) {
                        this.muted = window.lmSound.toggle();
                        if (!this.muted) window.lmSound.leaderChange();
                    } else {
                        this.muted = !this.muted;
                    }
                },
                async toggleFullscreen() {
                    try {
                        if (!document.fullscreenElement) {
                            await document.documentElement.requestFullscreen();
                        } else {
                            await document.exitFullscreen();
                        }
                    } catch (e) {
                        console.warn('[Fullscreen]', e);
                    }
                },

                openCandidateModal(c) {
                    this.modalCandidate = c;
                    document.body.style.overflow = 'hidden';
                },
                closeCandidateModal() {
                    this.modalCandidate = null;
                    if (!this.noticeOpen && !this.liveOpen) document.body.style.overflow = '';
                },
                openNoticeModal() {
                    this.noticeOpen = true;
                    document.body.style.overflow = 'hidden';
                },
                closeNoticeModal() {
                    this.noticeOpen = false;
                    if (!this.modalCandidate && !this.liveOpen) document.body.style.overflow = '';
                },
                openLiveModal() {
                    this.liveOpen = true;
                    document.body.style.overflow = 'hidden';
                },
                closeLiveModal() {
                    this.liveOpen = false;
                    if (!this.modalCandidate && !this.noticeOpen && !this.celebrationOpen) document.body.style.overflow = '';
                },

                // 偵測 admin 觸發的公告事件（celebrateAt timestamp 變化）
                maybeTriggerCelebration() {
                    const ts = Number(this.meta.celebrateAt) || 0;
                    if (!ts) { this._lastCelebrateAt = 0; return; }
                    // 首次載入：只記錄 timestamp，不自動播放（避免進站就被打擾）
                    if (this._lastCelebrateAt === 0 && this._firstLoad) {
                        this._lastCelebrateAt = ts;
                        return;
                    }
                    if (ts !== this._lastCelebrateAt) {
                        this._lastCelebrateAt = ts;
                        this.openCelebration();
                    }
                },
                openCelebration() {
                    // 取得當選人（rank === 1，可能多人並列）
                    this.celebrationWinners = this.leaderCandidates.slice();
                    if (this.celebrationWinners.length === 0) {
                        // 0 票時不公告
                        return;
                    }
                    this.celebrationOpen = true;
                    document.body.style.overflow = 'hidden';

                    // 連續 3 波 confetti（每 800ms 一波）
                    this.launchConfetti();
                    setTimeout(() => this.launchConfetti(), 800);
                    setTimeout(() => this.launchConfetti(), 1600);

                    // 鳴禮炮音
                    if (window.lmSound) window.lmSound.celebrate();
                },
                closeCelebration() {
                    this.celebrationOpen = false;
                    if (!this.modalCandidate && !this.noticeOpen && !this.liveOpen) document.body.style.overflow = '';
                },
                launchConfetti() {
                    const colors = ['#fbbf24', '#f97316', '#ef4444', '#ec4899', '#a855f7', '#3b82f6', '#10b981'];
                    const COUNT = 60;
                    for (let i = 0; i < COUNT; i++) {
                        const el = document.createElement('div');
                        el.className = 'confetti-piece';
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        const left = Math.random() * 100;
                        const duration = 2.5 + Math.random() * 2.5;
                        const delay = Math.random() * 0.6;
                        const w = 8 + Math.random() * 10;
                        const h = 12 + Math.random() * 14;
                        el.style.cssText = `
                            left: ${left}vw;
                            width: ${w}px;
                            height: ${h}px;
                            background: ${color};
                            border-radius: ${Math.random() > .5 ? '2px' : '50%'};
                            animation-duration: ${duration}s;
                            animation-delay: ${delay}s;
                            transform-origin: center;
                        `;
                        document.body.appendChild(el);
                        setTimeout(() => el.remove(), (duration + delay) * 1000 + 200);
                    }
                },
                // 將 YouTube URL 轉成 embed 形式
                ytEmbed(url) {
                    if (!url) return '';
                    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/))([\w-]+)/);
                    return m ? `https://www.youtube.com/embed/${m[1]}` : '';
                }
            };
        };
    </script>
