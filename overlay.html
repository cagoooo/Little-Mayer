<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 即時票數浮層</title>
    <meta name="robots" content="noindex">

    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1.0.32">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* OBS 浮層：透明背景，所有元素自帶描邊讓任何底色都看得清 */
        html, body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", "Microsoft JhengHei UI",
                         "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
            overflow: hidden;
        }
        [x-cloak] { display: none !important; }

        /* 文字外框線（雙重 text-shadow 模擬 stroke） */
        .text-stroke {
            text-shadow:
                -1px -1px 0 #000, 1px -1px 0 #000,
                -1px  1px 0 #000, 1px  1px 0 #000,
                0 4px 16px rgba(0,0,0,.6);
        }

        /* 卡片變動時閃光 */
        @keyframes flash {
            0% { background-color: rgba(254, 240, 138, .9); }
            100% { background-color: rgba(255, 255, 255, .96); }
        }
        .flash { animation: flash 1.2s ease-out; }

        /* 預設樣式 — 1080p OBS 用，可被 ?layout=xxx 覆寫 */
        body.layout-top3 { padding: 16px; }
        body.layout-bar  { padding: 12px 24px; }
        body.layout-full { padding: 24px; }
    </style>
</head>
<body x-data="overlayApp()" x-init="init()" x-cloak :class="`layout-${layout}`">

    <!-- ============ Layout: top3（Top 3 大卡） ============ -->
    <template x-if="layout === 'top3'">
        <div class="grid grid-cols-3 gap-3 w-full">
            <template x-for="(c, idx) in top3" :key="c.id">
                <div class="bg-white/95 rounded-xl shadow-2xl p-3 flex items-center gap-3 border-4 transition-all"
                     :id="'o-' + c.id"
                     :class="[
                         idx === 0 ? 'border-yellow-400' : (idx === 1 ? 'border-slate-400' : 'border-amber-600'),
                         changedIds.includes(c.id) ? 'flash' : ''
                     ]">
                    <!-- 排名徽章 -->
                    <div class="flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center text-2xl font-black shadow-lg ring-2 ring-white"
                         :class="rankBadgeColor(idx)">
                        <span x-text="rankLabel(idx)"></span>
                    </div>
                    <!-- 頭像 + 名字 + 票數 -->
                    <div class="flex-grow min-w-0 flex items-center gap-2">
                        <div class="flex-shrink-0 w-12 h-12 rounded-full overflow-hidden bg-slate-200 ring-2 ring-white shadow">
                            <template x-if="c.imageUrl">
                                <img :src="c.imageUrl" :alt="c.name" class="w-full h-full object-cover">
                            </template>
                        </div>
                        <div class="flex-grow min-w-0">
                            <div class="flex items-baseline gap-1.5">
                                <span class="bg-blue-700 text-white text-[10px] font-bold px-1.5 py-0.5 rounded tabular-nums" x-text="c.id + '號'"></span>
                                <span class="font-black text-base text-slate-800 truncate" x-text="c.name"></span>
                            </div>
                            <div class="flex items-baseline gap-1 leading-none mt-0.5">
                                <span class="text-3xl font-black text-blue-700 tabular-nums" x-text="c.votes.toLocaleString()"></span>
                                <span class="text-xs text-slate-500">票</span>
                                <span class="text-[10px] text-slate-400 ml-1 tabular-nums" x-text="'(' + percentage(c.votes) + '%)'"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- ============ Layout: bar（薄條狀，6 個橫排） ============ -->
    <template x-if="layout === 'bar'">
        <div class="bg-black/75 backdrop-blur rounded-xl shadow-2xl p-3 flex items-center gap-3 text-white">
            <div class="flex-shrink-0 text-xs font-bold tracking-wider opacity-80">
                <i class="fa-solid fa-square-poll-vertical mr-1"></i> 即時票數
                <div class="text-[10px] opacity-70" x-text="'總票數 ' + totalVotes.toLocaleString()"></div>
            </div>
            <div class="flex-grow grid grid-cols-6 gap-2">
                <template x-for="c in sortedById" :key="c.id">
                    <div class="text-center bg-white/10 rounded-lg p-1.5"
                         :id="'o-' + c.id"
                         :class="changedIds.includes(c.id) ? 'flash' : ''">
                        <div class="text-[10px] opacity-90 tabular-nums" x-text="c.id + '號 ' + c.name"></div>
                        <div class="text-xl font-black tabular-nums leading-tight" x-text="c.votes.toLocaleString()"></div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- ============ Layout: full（完整 6 卡，類 viewer 樣式） ============ -->
    <template x-if="layout === 'full'">
        <div class="grid grid-cols-3 gap-3 w-full">
            <template x-for="(c, idx) in sortedCandidates" :key="c.id">
                <div class="bg-white/95 rounded-xl shadow-2xl p-2 flex flex-col items-center gap-1"
                     :id="'o-' + c.id"
                     :class="changedIds.includes(c.id) ? 'flash' : ''">
                    <div class="flex items-baseline gap-1">
                        <span class="bg-blue-700 text-white text-xs font-bold px-1.5 py-0.5 rounded tabular-nums" x-text="c.id + '號'"></span>
                        <span class="font-black text-sm" x-text="c.name"></span>
                    </div>
                    <div class="text-2xl font-black text-blue-700 tabular-nums leading-none" x-text="c.votes.toLocaleString()"></div>
                </div>
            </template>
        </div>
    </template>

    <!-- 標題（左上角 watermark） -->
    <div x-show="showTitle"
         class="fixed top-2 left-2 text-stroke text-white text-xs font-bold pointer-events-none"
         x-text="meta.title || '石門國小自治市選舉'"></div>

    <!-- Module 必須在 Alpine 之前 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
        import { firebaseConfig, DEFAULT_CANDIDATES, DEFAULT_META } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.overlayApp = function () {
            return {
                candidates: [],
                meta: { ...DEFAULT_META },
                layout: 'top3',
                showTitle: false,
                changedIds: [],
                _prevVotes: {},
                _firstLoad: true,

                init() {
                    const qs = new URLSearchParams(location.search);
                    this.layout = qs.get('layout') || 'top3';
                    this.showTitle = qs.get('title') === '1';

                    onValue(ref(db, 'election/candidates'), (snap) => {
                        const v = snap.val();
                        if (!v) {
                            this.candidates = DEFAULT_CANDIDATES.map(c => ({ ...c }));
                        } else {
                            this.candidates = Object.values(v).map(c => ({
                                id: Number(c.id),
                                name: c.name || '',
                                imageUrl: c.imageUrl || '',
                                votes: Number(c.votes) || 0
                            })).sort((a, b) => a.id - b.id);
                        }
                        this.flashChanged();
                    });

                    onValue(ref(db, 'election/meta'), (snap) => {
                        const v = snap.val();
                        if (v) this.meta = { ...DEFAULT_META, ...v };
                    });
                },

                flashChanged() {
                    if (this._firstLoad) {
                        this._firstLoad = false;
                        for (const c of this.candidates) this._prevVotes[c.id] = c.votes;
                        return;
                    }
                    const changed = [];
                    for (const c of this.candidates) {
                        if (this._prevVotes[c.id] !== c.votes) changed.push(c.id);
                        this._prevVotes[c.id] = c.votes;
                    }
                    this.changedIds = changed;
                    if (changed.length) setTimeout(() => { this.changedIds = []; }, 1300);
                },

                get totalVotes() { return this.candidates.reduce((s, c) => s + c.votes, 0); },
                get sortedById() {
                    return [...this.candidates].sort((a, b) => a.id - b.id);
                },
                get sortedCandidates() {
                    return [...this.candidates].sort((a, b) => {
                        if (b.votes !== a.votes) return b.votes - a.votes;
                        return a.id - b.id;
                    });
                },
                get top3() { return this.sortedCandidates.slice(0, 3); },
                percentage(v) {
                    if (this.totalVotes === 0) return '0.0';
                    return (v * 100 / this.totalVotes).toFixed(1);
                },
                rankLabel(idx) { return ['🥇', '🥈', '🥉'][idx] || (idx + 1); },
                rankBadgeColor(idx) {
                    return [
                        'bg-gradient-to-br from-yellow-300 to-amber-500',
                        'bg-gradient-to-br from-slate-200 to-slate-400',
                        'bg-gradient-to-br from-amber-400 to-amber-700'
                    ][idx] || 'bg-slate-500';
                }
            };
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
