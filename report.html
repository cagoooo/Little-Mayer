<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開票結果報告｜石門國小自治市市長選舉</title>
    <meta name="robots" content="noindex">

    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1.0.30">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1.0.30">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: "Microsoft JhengHei", "Microsoft JhengHei UI",
                         "PingFang TC", "Heiti TC",
                         "Noto Sans TC", system-ui, sans-serif;
        }
        [x-cloak] { display: none !important; }

        /* === A4 列印樣式 === */
        @page {
            size: A4 portrait;
            margin: 14mm 12mm;
        }
        @media print {
            html, body { background: #fff !important; }
            .no-print { display: none !important; }
            .page-break-before { page-break-before: always; }
            .avoid-break { break-inside: avoid; page-break-inside: avoid; }
            /* 確保彩色背景能列印（瀏覽器預設關閉） */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        /* 螢幕預覽：模擬 A4 紙張 */
        @media screen {
            body { background: #e5e7eb; }
            .report-page {
                background: #fff;
                width: 210mm;
                min-height: 297mm;
                margin: 16px auto;
                padding: 14mm 12mm;
                box-shadow: 0 8px 32px rgba(0,0,0,.12);
            }
        }
    </style>
</head>
<body class="text-slate-800" x-data="reportApp()" x-init="init()" x-cloak>

    <!-- 螢幕顯示用的列印工具列 -->
    <div class="no-print sticky top-0 z-10 bg-slate-800 text-white px-4 py-2 flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-2 text-sm">
            <i class="fa-solid fa-file-pdf"></i>
            <span>開票結果報告（A4 直式預覽）</span>
            <span x-show="loading" class="text-amber-300 text-xs">
                <i class="fa-solid fa-circle-notch fa-spin"></i> 載入中...
            </span>
        </div>
        <div class="flex gap-2">
            <button @click="window.print()"
                    class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-1.5 rounded-lg text-sm font-medium">
                <i class="fa-solid fa-print mr-1"></i> 列印 / 存成 PDF
            </button>
            <a href="admin.html" class="bg-white/15 hover:bg-white/25 text-white px-4 py-1.5 rounded-lg text-sm">
                <i class="fa-solid fa-arrow-left mr-1"></i> 回後台
            </a>
        </div>
    </div>

    <!-- ============ 報告本體 (A4) ============ -->
    <div class="report-page">

        <!-- 標頭 -->
        <header class="text-center border-b-4 border-slate-800 pb-4 avoid-break">
            <div class="text-sm text-slate-500 tracking-widest mb-1">桃園市石門國民小學</div>
            <h1 class="text-3xl font-black tracking-wider" x-text="meta.title || '自治市市長選舉開票結果報告'"></h1>
            <p class="text-sm text-slate-600 mt-2">
                <i class="fa-solid fa-calendar-day mr-1"></i>
                列印時間：<span x-text="printedAt"></span>
                <span class="mx-2">|</span>
                計票狀態：<span class="font-bold" :class="meta.locked ? 'text-rose-700' : 'text-emerald-700'"
                                  x-text="meta.locked ? '已封存（最終結果）' : '計票進行中'"></span>
            </p>
        </header>

        <!-- 整體統計 -->
        <section class="mt-5 avoid-break">
            <h2 class="text-lg font-bold border-l-4 border-blue-600 pl-2 mb-3">一、整體統計</h2>
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 text-center">
                    <div class="text-xs text-slate-500 uppercase tracking-wider">總投票數</div>
                    <div class="text-3xl font-black text-blue-700 tabular-nums" x-text="totalVotes.toLocaleString()"></div>
                </div>
                <div class="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-center">
                    <div class="text-xs text-slate-500 uppercase tracking-wider">候選人數</div>
                    <div class="text-3xl font-black text-emerald-700 tabular-nums" x-text="candidates.length"></div>
                </div>
                <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-center">
                    <div class="text-xs text-slate-500 uppercase tracking-wider">最高得票</div>
                    <div class="text-3xl font-black text-amber-700 tabular-nums" x-text="maxVotes.toLocaleString()"></div>
                </div>
            </div>
        </section>

        <!-- 排名表 -->
        <section class="mt-5 avoid-break">
            <h2 class="text-lg font-bold border-l-4 border-rose-600 pl-2 mb-3">二、候選人排名</h2>
            <table class="w-full text-sm border-collapse">
                <thead>
                    <tr class="bg-slate-100">
                        <th class="border border-slate-300 px-2 py-1.5 text-center w-12">名次</th>
                        <th class="border border-slate-300 px-2 py-1.5 text-center w-12">號碼</th>
                        <th class="border border-slate-300 px-2 py-1.5 text-center w-16">照片</th>
                        <th class="border border-slate-300 px-2 py-1.5 text-left">姓名</th>
                        <th class="border border-slate-300 px-2 py-1.5 text-center w-20">得票數</th>
                        <th class="border border-slate-300 px-2 py-1.5 text-center w-20">得票率</th>
                        <th class="border border-slate-300 px-2 py-1.5 text-center w-16">當選</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="c in sortedCandidates" :key="c.id">
                        <tr :class="rankOf(c) === 1 ? 'bg-yellow-50' : ''">
                            <td class="border border-slate-300 px-2 py-1.5 text-center font-bold tabular-nums">
                                <span x-text="rankOf(c) === null ? '—' : rankOf(c)"></span>
                                <span x-show="rankOf(c) === 1" class="ml-1">🥇</span>
                                <span x-show="rankOf(c) === 2" class="ml-1">🥈</span>
                                <span x-show="rankOf(c) === 3" class="ml-1">🥉</span>
                            </td>
                            <td class="border border-slate-300 px-2 py-1.5 text-center font-bold tabular-nums" x-text="c.id"></td>
                            <td class="border border-slate-300 p-1 text-center">
                                <div class="w-12 h-12 rounded-full overflow-hidden bg-slate-200 mx-auto">
                                    <template x-if="c.imageUrl">
                                        <img :src="c.imageUrl" :alt="c.name" class="w-full h-full object-cover">
                                    </template>
                                    <template x-if="!c.imageUrl">
                                        <div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-user text-slate-400"></i></div>
                                    </template>
                                </div>
                            </td>
                            <td class="border border-slate-300 px-2 py-1.5 font-bold" x-text="c.name"></td>
                            <td class="border border-slate-300 px-2 py-1.5 text-right tabular-nums font-bold" x-text="c.votes.toLocaleString()"></td>
                            <td class="border border-slate-300 px-2 py-1.5 text-right tabular-nums" x-text="percentage(c.votes) + '%'"></td>
                            <td class="border border-slate-300 px-2 py-1.5 text-center">
                                <span x-show="rankOf(c) === 1" class="inline-block bg-amber-500 text-white text-xs font-bold px-2 py-0.5 rounded">當選</span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <p class="text-xs text-slate-500 mt-2">
                ※ 名次採 dense ranking 計票方式（票數相同視為同名次）。
            </p>
        </section>

        <!-- 候選人政見摘要（換頁顯示） -->
        <section class="mt-5 page-break-before">
            <h2 class="text-lg font-bold border-l-4 border-emerald-600 pl-2 mb-3">三、候選人政見摘要</h2>
            <div class="space-y-4">
                <template x-for="c in sortedCandidates" :key="c.id">
                    <div class="border border-slate-300 rounded-lg p-3 avoid-break"
                         :class="rankOf(c) === 1 ? 'bg-yellow-50 border-amber-400' : ''">
                        <div class="flex items-start gap-3">
                            <div class="flex-shrink-0 w-16 h-16 rounded-lg overflow-hidden bg-slate-200">
                                <template x-if="c.imageUrl">
                                    <img :src="c.imageUrl" :alt="c.name" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!c.imageUrl">
                                    <div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-user text-slate-400 text-2xl"></i></div>
                                </template>
                            </div>
                            <div class="flex-grow min-w-0">
                                <div class="flex flex-wrap items-baseline gap-2 mb-1">
                                    <span class="bg-blue-600 text-white text-xs font-bold px-2 py-0.5 rounded">
                                        <span x-text="c.id"></span> 號
                                    </span>
                                    <h3 class="text-base font-bold" x-text="c.name"></h3>
                                    <span class="text-xs text-slate-500 tabular-nums">
                                        得票 <strong x-text="c.votes.toLocaleString()"></strong> 票
                                        (<span x-text="percentage(c.votes) + '%'"></span>)
                                    </span>
                                    <span x-show="rankOf(c) === 1" class="bg-amber-500 text-white text-xs font-bold px-2 py-0.5 rounded">🏆 當選</span>
                                </div>
                                <div class="grid grid-cols-2 gap-3 mt-2 text-xs">
                                    <div>
                                        <div class="font-bold text-amber-700 mb-1">
                                            <i class="fa-solid fa-medal"></i> 個人經歷
                                        </div>
                                        <div class="text-slate-700 whitespace-pre-line leading-relaxed"
                                             x-text="c.bio || '（未提供）'"></div>
                                    </div>
                                    <div>
                                        <div class="font-bold text-rose-700 mb-1">
                                            <i class="fa-solid fa-bullhorn"></i> 政見內容
                                        </div>
                                        <div class="text-slate-700 whitespace-pre-line leading-relaxed"
                                             x-text="c.policies || '（未提供）'"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- 簽名欄 -->
        <section class="mt-6 avoid-break">
            <h2 class="text-lg font-bold border-l-4 border-slate-600 pl-2 mb-3">四、計票證明</h2>
            <div class="grid grid-cols-3 gap-4 text-sm">
                <div class="border-t-2 border-slate-300 pt-2 text-center">
                    <div class="text-xs text-slate-500 mb-8">唱票員</div>
                    <div class="text-xs text-slate-400">（簽名）</div>
                </div>
                <div class="border-t-2 border-slate-300 pt-2 text-center">
                    <div class="text-xs text-slate-500 mb-8">監票員</div>
                    <div class="text-xs text-slate-400">（簽名）</div>
                </div>
                <div class="border-t-2 border-slate-300 pt-2 text-center">
                    <div class="text-xs text-slate-500 mb-8">承辦人</div>
                    <div class="text-xs text-slate-400">（簽名）</div>
                </div>
            </div>
        </section>

        <!-- 頁尾 -->
        <footer class="mt-8 pt-3 border-t border-slate-300 text-xs text-slate-500 flex justify-between avoid-break">
            <span>桃園市石門國民小學 自治市市長選舉</span>
            <span>系統版本 v1.0.22 ｜ Made by 阿凱老師</span>
        </footer>
    </div>

    <!-- Module 必須在 Alpine 之前 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
        import { firebaseConfig, DEFAULT_CANDIDATES, DEFAULT_META } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.reportApp = function () {
            return {
                candidates: [],
                meta: { ...DEFAULT_META },
                loading: true,
                printedAt: '',

                init() {
                    const ts = new Date();
                    const pad = n => String(n).padStart(2, '0');
                    this.printedAt = `${ts.getFullYear()}/${pad(ts.getMonth()+1)}/${pad(ts.getDate())} ${pad(ts.getHours())}:${pad(ts.getMinutes())}:${pad(ts.getSeconds())}`;

                    onValue(ref(db, 'election/candidates'), (snap) => {
                        const v = snap.val();
                        if (!v) {
                            this.candidates = DEFAULT_CANDIDATES.map(c => ({ ...c }));
                        } else {
                            this.candidates = Object.values(v).map(c => ({
                                id: Number(c.id),
                                name: c.name || '',
                                imageUrl: c.imageUrl || '',
                                votes: Number(c.votes) || 0,
                                bio: c.bio || '',
                                policies: c.policies || ''
                            })).sort((a, b) => a.id - b.id);
                        }
                        this.loading = false;

                        // URL 帶 ?auto=1 自動觸發列印對話框
                        if (this._auto && this.candidates.length > 0 && !this._printed) {
                            this._printed = true;
                            setTimeout(() => window.print(), 500);
                        }
                    });

                    onValue(ref(db, 'election/meta'), (snap) => {
                        const v = snap.val();
                        if (v) this.meta = { ...DEFAULT_META, ...v };
                    });

                    this._auto = new URLSearchParams(location.search).get('auto') === '1';
                },

                get totalVotes() { return this.candidates.reduce((s, c) => s + c.votes, 0); },
                get maxVotes() { return this.candidates.length ? Math.max(...this.candidates.map(c => c.votes)) : 0; },
                get sortedCandidates() {
                    return [...this.candidates].sort((a, b) => {
                        if (b.votes !== a.votes) return b.votes - a.votes;
                        return a.id - b.id;
                    });
                },
                get rankMap() {
                    const distinct = [...new Set(
                        this.candidates.filter(c => c.votes > 0).map(c => c.votes)
                    )].sort((a, b) => b - a);
                    const map = {};
                    for (const c of this.candidates) {
                        map[c.id] = c.votes === 0 ? null : distinct.indexOf(c.votes) + 1;
                    }
                    return map;
                },
                rankOf(c) { return this.rankMap[c.id]; },
                percentage(v) {
                    if (this.totalVotes === 0) return '0.0';
                    return (v * 100 / this.totalVotes).toFixed(1);
                }
            };
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="version-check.js?v=1.0.30"></script>
</body>
</html>
