<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台唱票｜石門國小自治市市長選舉</title>
    <meta name="description" content="石門國小第29屆自治市市長選舉後台唱票系統 — 教師登入後可即時加票、修正、封存。">
    <meta name="robots" content="noindex"> <!-- 後台不要被搜尋引擎索引 -->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1.0.31">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1.0.31">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=1.0.31">

    <!-- Open Graph（後台分享機率低，但保持風格一致） -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cagoooo.github.io/Little-Mayer/admin.html">
    <meta property="og:title" content="後台唱票系統｜石門國小自治市市長選舉">
    <meta property="og:description" content="教師唱票員專用後台 — 即時加票，全校監票畫面同步更新。">
    <meta property="og:image" content="https://cagoooo.github.io/Little-Mayer/assets/og-preview.png?v=1.0.31">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="zh_TW">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, -apple-system, "Microsoft JhengHei", sans-serif; }
        [x-cloak] { display: none !important; }

        /* 按鈕互動 */
        .vote-btn { transition: transform .12s, box-shadow .12s; }
        .vote-btn:active { transform: scale(0.93); }
        .vote-btn-add:hover { box-shadow: 0 8px 20px rgba(37,99,235,.4); }

        /* 票數數字跳動 + 變色 */
        @keyframes num-pop {
            0%   { transform: scale(1);    color: #1e293b; text-shadow: none; }
            40%  { transform: scale(1.45); color: #16a34a; text-shadow: 0 4px 24px rgba(22,163,74,.5); }
            100% { transform: scale(1);    color: #1e293b; text-shadow: none; }
        }
        .num-pop { animation: num-pop .55s cubic-bezier(.4,0,.2,1); }

        /* 卡片光暈（+1 後） */
        @keyframes card-flash {
            0%   { box-shadow: 0 0 0 0   rgba(37,99,235,0); }
            30%  { box-shadow: 0 0 0 12px rgba(37,99,235,.45); }
            100% { box-shadow: 0 0 0 0   rgba(37,99,235,0); }
        }
        .card-flash { animation: card-flash .9s ease-out; }

        /* 卡片 -1 用紅色 */
        @keyframes card-flash-minus {
            0%   { box-shadow: 0 0 0 0   rgba(239,68,68,0); }
            30%  { box-shadow: 0 0 0 12px rgba(239,68,68,.45); }
            100% { box-shadow: 0 0 0 0   rgba(239,68,68,0); }
        }
        .card-flash-minus { animation: card-flash-minus .9s ease-out; }

        /* +1 飄字 */
        @keyframes float-up {
            0%   { transform: translate(-50%, 0)     scale(1);   opacity: 1; }
            100% { transform: translate(-50%, -90px) scale(1.6); opacity: 0; }
        }
        .float-plus {
            position: absolute; left: 50%; top: 50%;
            color: #16a34a; font-size: 36px; font-weight: 900;
            text-shadow: 0 2px 12px rgba(22,163,74,.5);
            pointer-events: none; z-index: 30;
            animation: float-up 1.1s cubic-bezier(.4,0,.2,1) forwards;
        }
        .float-minus {
            position: absolute; left: 50%; top: 50%;
            color: #ef4444; font-size: 32px; font-weight: 900;
            text-shadow: 0 2px 12px rgba(239,68,68,.5);
            pointer-events: none; z-index: 30;
            animation: float-up 1.1s cubic-bezier(.4,0,.2,1) forwards;
        }

        /* 按鈕 ripple 點擊波紋 */
        @keyframes ripple {
            0%   { transform: scale(0);   opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,.7);
            pointer-events: none;
            animation: ripple .6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col" x-data="adminApp()" x-init="init()" x-cloak>

    <!-- ========== 登入畫面 ========== -->
    <div x-show="authState === 'signed_out'"
         class="flex-grow flex items-center justify-center px-4 py-10">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-rose-400 to-rose-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
                    <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">後台唱票系統</h1>
                <p class="text-slate-500 text-sm mt-1">請使用教師帳號登入</p>
            </div>

            <form @submit.prevent="signIn()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">電子郵件</label>
                    <input type="email" x-model="loginEmail" required autocomplete="username"
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
                    <input type="password" x-model="loginPassword" required autocomplete="current-password"
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                </div>

                <div x-show="loginError" class="bg-rose-50 border border-rose-200 text-rose-700 text-sm px-4 py-2 rounded-lg" x-text="loginError"></div>

                <button type="submit" :disabled="loginBusy"
                        class="w-full bg-rose-600 hover:bg-rose-700 disabled:bg-slate-400 text-white font-bold py-3 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-right-to-bracket" x-show="!loginBusy"></i>
                    <i class="fa-solid fa-circle-notch fa-spin" x-show="loginBusy"></i>
                    <span x-text="loginBusy ? '驗證中...' : '登入'"></span>
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-slate-200 text-xs text-slate-500 text-center space-y-1">
                <p>帳號需事前由管理員在 Firebase Console 建立</p>
                <a href="index.html" class="text-rose-600 hover:underline inline-block mt-2">
                    <i class="fa-solid fa-arrow-left mr-1"></i> 回主頁
                </a>
            </div>
        </div>
    </div>

    <!-- ========== 已登入：唱票主畫面 ========== -->
    <template x-if="authState === 'signed_in'">
        <div class="flex flex-col flex-grow">

            <!-- 頂部列（緊湊版：標題 + 操作 + 分頁全在一列） -->
            <header class="bg-gradient-to-r from-rose-700 to-rose-900 text-white shadow-lg sticky top-0 z-20">
                <div class="max-w-[1600px] mx-auto px-3 lg:px-4 py-2 flex flex-wrap items-center justify-between gap-2">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-shield-halved text-lg"></i>
                        <div class="leading-tight">
                            <h1 class="text-sm md:text-base font-bold">後台唱票系統</h1>
                            <p class="text-rose-100 text-[10px]" x-text="meta.title"></p>
                        </div>

                        <!-- 分頁切換放標題旁邊 -->
                        <div class="ml-3 flex gap-0.5 bg-black/20 rounded-lg p-0.5">
                            <button @click="tab = 'count'"
                                    :class="tab === 'count' ? 'bg-white text-rose-700' : 'text-white hover:bg-white/10'"
                                    class="px-3 py-1 rounded-md text-xs font-medium transition-colors">
                                <i class="fa-solid fa-square-check mr-1"></i>唱票
                            </button>
                            <button @click="tab = 'settings'"
                                    :class="tab === 'settings' ? 'bg-white text-rose-700' : 'text-white hover:bg-white/10'"
                                    class="px-3 py-1 rounded-md text-xs font-medium transition-colors">
                                <i class="fa-solid fa-gear mr-1"></i>設定
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center gap-1.5">
                        <button @click="toggleLock()"
                                :class="meta.locked ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-500 hover:bg-emerald-600'"
                                class="text-white text-xs px-2.5 py-1 rounded-lg flex items-center gap-1 font-medium">
                            <i class="fa-solid" :class="meta.locked ? 'fa-lock' : 'fa-lock-open'"></i>
                            <span x-text="meta.locked ? '已封存' : '計票中'"></span>
                        </button>

                        <!-- 觀眾人數（只有當有人在看才顯示） -->
                        <div x-show="viewerCount > 0"
                             class="flex items-center gap-1 bg-emerald-500/30 backdrop-blur px-2.5 py-1 rounded-lg text-xs font-medium"
                             :title="`目前 ${viewerCount} 位觀眾 + ${adminCount} 位唱票員上線`">
                            <i class="fa-solid fa-users"></i>
                            <span class="tabular-nums" x-text="viewerCount"></span>
                            <span class="hidden sm:inline">人在看</span>
                        </div>

                        <div class="flex items-center gap-1 bg-white/15 backdrop-blur px-2.5 py-1 rounded-lg text-xs">
                            <span class="w-2 h-2 rounded-full" :class="connected ? 'bg-emerald-300' : 'bg-rose-300'"></span>
                            <span x-text="connected ? '已連線' : '中斷'"></span>
                        </div>

                        <!-- 靜音切換 -->
                        <button @click="toggleMute()"
                                class="bg-white/15 hover:bg-white/25 text-white text-xs px-2.5 py-1 rounded-lg"
                                :title="muted ? '目前靜音，點擊恢復音效' : '目前有音效，點擊靜音'">
                            <i class="fa-solid" :class="muted ? 'fa-volume-xmark' : 'fa-volume-high'"></i>
                        </button>

                        <button @click="signOut()"
                                class="bg-white/15 hover:bg-white/25 text-white text-xs px-2.5 py-1 rounded-lg">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i> 登出
                        </button>
                    </div>
                </div>
            </header>

            <main class="flex-grow max-w-[1600px] mx-auto w-full px-3 lg:px-4 py-3 flex flex-col gap-3">

                <!-- ============= 唱票分頁 ============= -->
                <div x-show="tab === 'count'" class="flex flex-col gap-3 flex-grow" id="screenshot-area">

                    <!-- 統計列（緊湊版） -->
                    <div class="bg-white rounded-xl shadow-sm px-4 py-2.5 flex flex-wrap items-center justify-between gap-3">
                        <div class="flex items-center gap-5">
                            <div>
                                <div class="text-[10px] text-slate-500 font-medium uppercase tracking-wider leading-tight">總票數</div>
                                <div class="text-2xl font-black text-slate-800 tabular-nums leading-tight" x-text="totalVotes"></div>
                            </div>
                            <div class="w-px h-9 bg-slate-200"></div>
                            <div>
                                <div class="text-[10px] text-slate-500 font-medium uppercase tracking-wider leading-tight">最高票</div>
                                <div class="text-2xl font-black text-blue-600 tabular-nums leading-tight" x-text="maxVotes"></div>
                            </div>
                        </div>

                        <div class="flex gap-2 flex-wrap">
                            <button @click="exportCSV()" :disabled="totalVotes === 0"
                                    class="bg-emerald-100 hover:bg-emerald-200 disabled:opacity-40 disabled:cursor-not-allowed text-emerald-800 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5"
                                    title="下載開票結果 CSV（Excel 可開）">
                                <i class="fa-solid fa-file-csv"></i> 匯出 CSV
                            </button>
                            <button @click="exportScreenshot()" :disabled="busyShot"
                                    class="bg-blue-100 hover:bg-blue-200 disabled:opacity-40 disabled:cursor-not-allowed text-blue-800 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5"
                                    title="下載目前畫面截圖 PNG">
                                <i class="fa-solid" :class="busyShot ? 'fa-circle-notch fa-spin' : 'fa-camera'"></i>
                                <span x-text="busyShot ? '截圖中...' : '截圖存檔'"></span>
                            </button>
                            <a href="report.html" target="_blank" rel="noopener"
                               class="bg-rose-100 hover:bg-rose-200 text-rose-800 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5"
                               title="開啟正式 A4 開票結果報告（可列印為 PDF）">
                                <i class="fa-solid fa-file-pdf"></i> 列印報告
                            </a>
                            <a href="overlay.html?layout=top3" target="_blank" rel="noopener"
                               class="bg-indigo-100 hover:bg-indigo-200 text-indigo-800 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5"
                               title="OBS 直播浮層連結（透明背景，給直播主用）">
                                <i class="fa-solid fa-video"></i> OBS 浮層
                            </a>
                            <a href="poster.html" target="_blank" rel="noopener"
                               class="bg-amber-100 hover:bg-amber-200 text-amber-800 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5"
                               title="生成當選人 1080×1920 直式海報（IG/FB 限動分享用）">
                                <i class="fa-solid fa-image"></i> 當選海報
                            </a>
                            <button @click="openTimeline()"
                                    class="bg-violet-100 hover:bg-violet-200 text-violet-800 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5"
                                    title="顯示開票時間軸（每分鐘各候選人累積票數曲線）">
                                <i class="fa-solid fa-chart-line"></i> 時間軸
                            </button>
                            <button x-show="meta.locked"
                                    @click="republishCelebration()"
                                    class="bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-500 hover:to-amber-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 shadow"
                                    title="再次發布開票公告（所有監票畫面會重播當選動畫）">
                                <i class="fa-solid fa-trophy"></i> 重新公告
                            </button>
                            <button @click="undoLast()" :disabled="!lastAction || busy"
                                    class="bg-slate-200 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed text-slate-700 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5">
                                <i class="fa-solid fa-rotate-left"></i> 復原上次
                            </button>
                            <button @click="resetVotes()" :disabled="busy"
                                    class="bg-slate-200 hover:bg-rose-100 hover:text-rose-700 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5">
                                <i class="fa-solid fa-arrows-rotate"></i> 票數歸零
                            </button>
                        </div>
                    </div>

                    <!-- 鎖定提示 -->
                    <div x-show="meta.locked" class="bg-amber-50 border border-amber-200 text-amber-800 p-2.5 rounded-xl text-xs flex items-start gap-2">
                        <i class="fa-solid fa-lock mt-0.5"></i>
                        <span>計票已封存，無法繼續加票。如需修正請點右上角解鎖。</span>
                    </div>

                    <!-- 候選人卡片：手機 1 欄 → 平板 2/3 欄 → 桌機 6 欄一排 -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 lg:gap-3">
                        <template x-for="c in sortedCandidates" :key="c.id">
                            <div class="bg-white rounded-2xl shadow-md overflow-hidden flex flex-col relative"
                                 :id="'admin-card-'+c.id">

                                <!-- 號碼徽章（漂浮在照片左上） -->
                                <div class="absolute top-2 left-2 z-10 bg-gradient-to-br from-blue-500 to-blue-700 text-white px-2.5 py-1 rounded-lg shadow-lg ring-2 ring-white flex items-baseline gap-0.5">
                                    <span class="text-lg lg:text-xl font-black leading-none tabular-nums" x-text="c.id"></span>
                                    <span class="text-[10px] font-bold opacity-90">號</span>
                                </div>

                                <!-- 大照片 (aspect-square 填滿卡寬) -->
                                <div class="relative bg-gradient-to-b from-slate-100 to-slate-200 aspect-square overflow-hidden">
                                    <template x-if="c.imageUrl">
                                        <img :src="c.imageUrl" :alt="c.name" class="w-full h-full object-cover" @error="$el.style.display='none'">
                                    </template>
                                    <template x-if="!c.imageUrl">
                                        <div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-user text-slate-400 text-5xl"></i></div>
                                    </template>
                                </div>

                                <!-- 姓名 + 票數 + 按鈕 -->
                                <div class="p-2 lg:p-2.5 flex flex-col gap-1.5">
                                    <h3 class="text-base lg:text-lg font-bold text-slate-800 text-center truncate" x-text="c.name"></h3>

                                    <div class="flex items-end justify-center gap-1.5 leading-none">
                                        <span class="text-[10px] text-slate-500 uppercase tracking-wider mb-1">得票</span>
                                        <span class="text-4xl lg:text-5xl font-black text-slate-800 tabular-nums" :id="'cnt-'+c.id" x-text="c.votes"></span>
                                    </div>

                                    <div class="flex gap-1.5 mt-1">
                                        <button @click="changeVote(c.id, -1, $event)"
                                                :disabled="c.votes === 0 || meta.locked || busy"
                                                class="vote-btn relative overflow-hidden w-10 h-11 rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center text-base shadow-sm flex-shrink-0"
                                                title="減少一票（修正）">
                                            <i class="fa-solid fa-minus pointer-events-none"></i>
                                        </button>
                                        <button @click="changeVote(c.id, +1, $event)"
                                                :disabled="meta.locked || busy"
                                                class="vote-btn vote-btn-add relative overflow-hidden flex-grow h-11 rounded-lg bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 disabled:cursor-not-allowed text-white text-base lg:text-lg font-bold shadow-md flex items-center justify-center gap-1.5">
                                            <i class="fa-solid fa-plus pointer-events-none"></i><span class="pointer-events-none">+1 票</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- ============= 設定分頁 ============= -->
                <div x-show="tab === 'settings'" class="space-y-6">

                    <!-- 活動資訊 -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                        <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b pb-3 border-slate-100">
                            <i class="fa-solid fa-flag text-rose-500"></i> 活動資訊
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">活動主標題</label>
                                <input type="text" x-model="meta.title" @change="saveMeta()"
                                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">副標題</label>
                                <input type="text" x-model="meta.subtitle" @change="saveMeta()"
                                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                            </div>
                        </div>

                        <!-- 開放開票時間（倒數計時用） -->
                        <div class="mt-4 pt-4 border-t border-slate-100">
                            <label class="block text-sm font-medium text-slate-700 mb-1">
                                <i class="fa-solid fa-clock text-rose-500 mr-1"></i>
                                開放開票時間（選填）
                            </label>
                            <div class="flex flex-wrap gap-2 items-center">
                                <input type="datetime-local" x-model="meta.openAt" @change="saveMeta()"
                                       class="px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                                <button @click="setOpenAtRelative(5)" class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs px-3 py-2 rounded-lg font-medium">+5 分</button>
                                <button @click="setOpenAtRelative(10)" class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs px-3 py-2 rounded-lg font-medium">+10 分</button>
                                <button @click="setOpenAtRelative(30)" class="bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs px-3 py-2 rounded-lg font-medium">+30 分</button>
                                <button @click="meta.openAt = ''; saveMeta()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 text-xs px-3 py-2 rounded-lg font-medium">
                                    <i class="fa-solid fa-play"></i> 立即開放
                                </button>
                            </div>
                            <p class="text-xs text-slate-500 mt-1.5">
                                留空 = 立即開放；設定時間後監票畫面會顯示倒數，開票員仍可隨時加票。
                            </p>
                        </div>

                        <!-- 選舉注意事項影片 -->
                        <div class="mt-4 pt-4 border-t border-slate-100">
                            <label class="block text-sm font-medium text-slate-700 mb-1">
                                <i class="fa-brands fa-youtube text-red-600 mr-1"></i>
                                選舉注意事項影片（YouTube 連結，選填）
                            </label>
                            <input type="text" x-model="meta.noticeVideoUrl" @change="saveMeta()"
                                   placeholder="https://youtu.be/xxxxx"
                                   class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                            <p class="text-xs text-slate-500 mt-1.5">

    <!-- Module 必須在 Alpine 之前載入並設定 window.adminApp。
         不可用 top-level await，否則 module yield 時 Alpine 會先跑而找不到 adminApp。 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import {
            getAuth, signInWithEmailAndPassword, signOut as fbSignOut,
            onAuthStateChanged, setPersistence, browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        import {
            getDatabase, ref, onValue, set, update, runTransaction, remove, push,
            onDisconnect, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
        import { firebaseConfig, DEFAULT_CANDIDATES, DEFAULT_META } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        // setPersistence 改成 fire-and-forget，避免 top-level await 阻塞 window.adminApp 註冊
        setPersistence(auth, browserLocalPersistence).catch(e => console.warn('[Auth] setPersistence', e));

        window.adminApp = function () {
            return {
                authState: 'loading', // loading | signed_out | signed_in
                user: null,

                loginEmail: '',
                loginPassword: '',
                loginError: '',
                loginBusy: false,

                tab: 'count',
                candidates: [],
                meta: { ...DEFAULT_META },
                connected: false,
                busy: false,
                busyShot: false,
                muted: localStorage.getItem('lm_muted') === '1',
                lastAction: null, // {type:'add'|'sub', id, by}
                uploadingId: null, // 哪個候選人正在上傳照片
                uploadingLogo: false,
                timelineOpen: false,
                timelineLog: [],
                timelineFirstAt: '',
                timelineLastAt: '',
                _timelineChart: null,
                viewerCount: 0,
                adminCount: 0,

                toast: { show: false, msg: '', type: 'success' },

                init() {
                    onAuthStateChanged(auth, (u) => {
                        if (u) {
                            this.user = u;
                            this.authState = 'signed_in';
                            this.bindData();
                        } else {
                            this.user = null;
                            this.authState = 'signed_out';
                        }
                    });
                },

                async signIn() {
                    this.loginBusy = true;
                    this.loginError = '';
                    try {
                        await signInWithEmailAndPassword(auth, this.loginEmail.trim(), this.loginPassword);
                        this.loginPassword = '';
                    } catch (e) {
                        const map = {
                            'auth/invalid-credential': '帳號或密碼錯誤',
                            'auth/invalid-email': 'Email 格式錯誤',
                            'auth/user-not-found': '此帳號不存在',
                            'auth/wrong-password': '密碼錯誤',
                            'auth/too-many-requests': '錯誤次數過多，請稍後再試',
                            'auth/network-request-failed': '網路錯誤'
                        };
                        this.loginError = map[e.code] || ('登入失敗：' + (e.code || e.message));
                    } finally {
                        this.loginBusy = false;
                    }
                },

                async signOut() {
                    if (!confirm('確定要登出嗎？')) return;
                    await fbSignOut(auth);
                },

                bindData() {
                    const myPresenceRef = push(ref(db, 'election/presence'));
                    onValue(ref(db, '.info/connected'), (s) => {
                        this.connected = s.val() === true;
                        if (this.connected) {
                            onDisconnect(myPresenceRef).remove();
                            set(myPresenceRef, { ts: serverTimestamp(), role: 'admin' });
                        }
                    });
                    onValue(ref(db, 'election/presence'), (snap) => {
                        let v = 0, a = 0;
                        snap.forEach(c => {
                            const r = (c.val() && c.val().role) || 'viewer';
                            if (r === 'admin') a++;
                            else v++;
                        });
                        this.viewerCount = v;
                        this.adminCount = a;
                    });

                    onValue(ref(db, 'election/candidates'), async (snap) => {
                        const v = snap.val();
                        if (!v) {
                            // 第一次使用：寫入預設值
                            await this.restoreDefaults(true);
                            return;
                        }
                        this.candidates = Object.values(v).map(c => ({
                            id: Number(c.id),
                            name: c.name || '',
                            imageUrl: c.imageUrl || '',
                            votes: Number(c.votes) || 0,
                            bio: c.bio || '',
                            policies: c.policies || '',
                            videoUrl: c.videoUrl || ''
                        })).sort((a, b) => a.id - b.id);
                    });

                    onValue(ref(db, 'election/meta'), (snap) => {
                        const v = snap.val();
                        if (!v) {
                            set(ref(db, 'election/meta'), { ...DEFAULT_META });
                        } else {
                            this.meta = { ...DEFAULT_META, ...v };
                        }
                    });
                },

                get totalVotes() { return this.candidates.reduce((s, c) => s + c.votes, 0); },
                get maxVotes() { return this.candidates.length ? Math.max(...this.candidates.map(c => c.votes)) : 0; },
                get sortedCandidates() {
                    return [...this.candidates].sort((a, b) => a.id - b.id);
                },

                async changeVote(id, delta, event) {
                    if (this.meta.locked) return this.notify('計票已封存', 'error');
                    if (this.busy) return;
                    this.busy = true;

                    // 立刻觸發按鈕特效 + 音效，不等網路
                    if (event) this.spawnRipple(event);
                    this.spawnFloatLabel(id, delta);
                    if (window.lmSound) {
                        delta > 0 ? window.lmSound.voteAdd() : window.lmSound.voteSub();
                    }

                    try {
                        await runTransaction(ref(db, `election/candidates/${id}/votes`), (cur) => {
                            const n = (cur || 0) + delta;
                            return n < 0 ? 0 : n;
                        });
                        this.lastAction = { type: delta > 0 ? 'add' : 'sub', id, by: delta };
                        await push(ref(db, 'election/log'), {
                            ts: Date.now(), action: 'vote', id, delta, by: this.user.email
                        }).catch(() => {});
                        this.bumpCard(id, delta);
                    } catch (e) {
                        this.notify('寫入失敗：' + e.message, 'error');
                    } finally {
                        this.busy = false;
                    }
                },

                async undoLast() {
                    if (!this.lastAction) return;
                    const { id, by } = this.lastAction;
                    this.lastAction = null;
                    await this.changeVote(id, -by);
                    this.notify('已復原上一次操作');
                },

                // 按鈕點擊處 spawn ripple
                spawnRipple(event) {
                    const btn = event.currentTarget;
                    if (!btn) return;
                    const rect = btn.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = event.clientX - rect.left - size / 2;
                    const y = event.clientY - rect.top  - size / 2;
                    const r = document.createElement('span');
                    r.className = 'ripple';
                    r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
                    btn.appendChild(r);
                    setTimeout(() => r.remove(), 650);
                },

                // 卡片上飄出 +1 或 -1
                spawnFloatLabel(id, delta) {
                    const card = document.getElementById('admin-card-' + id);
                    if (!card) return;
                    const float = document.createElement('div');
                    float.className = delta > 0 ? 'float-plus' : 'float-minus';
                    float.textContent = (delta > 0 ? '+' : '') + delta;
                    card.appendChild(float);
                    setTimeout(() => float.remove(), 1150);
                },

                // 票數寫入成功後：數字跳動 + 卡片光暈
                bumpCard(id, delta) {
                    this.$nextTick(() => {
                        const num = document.getElementById('cnt-' + id);
                        if (num) {
                            num.classList.remove('num-pop');
                            void num.offsetWidth;
                            num.classList.add('num-pop');
                        }
                        const card = document.getElementById('admin-card-' + id);
                        if (card) {
                            const cls = delta > 0 ? 'card-flash' : 'card-flash-minus';
                            card.classList.remove('card-flash', 'card-flash-minus');
                            void card.offsetWidth;
                            card.classList.add(cls);
                        }
                    });
                },

                async toggleLock() {
                    const next = !this.meta.locked;
                    if (next && !confirm('確定要封存計票嗎？封存後將無法繼續加票，並會自動發布開票公告畫面。')) return;
                    if (!next && !confirm('確定要解除封存嗎？解除後可再次修改票數。')) return;
                    const updates = { locked: next };
                    if (next) {
                        updates.celebrateAt = Date.now(); // 同步發布公告
                    }
                    await update(ref(db, 'election/meta'), updates);
                    this.notify(next ? '✓ 已封存並發布開票公告' : '已解除封存');
                },

                // 手動重新公告當選結果（封存狀態下顯示按鈕）
                async republishCelebration() {
                    if (!confirm('重新發布開票公告？所有監票畫面會再次播放當選公告動畫。')) return;
                    await update(ref(db, 'election/meta'), { celebrateAt: Date.now() });
                    this.notify('✓ 已重新發布開票公告');
                },

                async resetVotes() {
                    if (!confirm('確定要將所有候選人票數歸零嗎？此動作無法復原。')) return;
                    if (!confirm('再次確認：真的要歸零所有票數？')) return;
                    const updates = {};
                    for (const c of this.candidates) {
                        updates[`election/candidates/${c.id}/votes`] = 0;
                    }
                    await update(ref(db), updates);
                    this.lastAction = null;
                    this.notify('已將所有票數歸零');
                },

                async saveMeta() {
                    // 用 update 不會覆蓋未列出的欄位（celebrateAt 等保留）
                    await update(ref(db, 'election/meta'), {
                        title: this.meta.title || '',
                        subtitle: this.meta.subtitle || '',
                        locked: !!this.meta.locked,
                        openAt: this.meta.openAt || '',
                        noticeVideoUrl: this.meta.noticeVideoUrl || '',
                        liveVideoUrl: this.meta.liveVideoUrl || '',
                        schoolLogoUrl: this.meta.schoolLogoUrl || ''
                    });
                    this.notify('活動資訊已儲存');
                },

                // 上傳學校 LOGO（縮成 max 256px PNG → base64 → 寫 meta.schoolLogoUrl）
                async uploadLogo(event) {
                    const input = event.target;
                    const file = input.files && input.files[0];
                    input.value = '';
                    if (!file) return;
                    if (!file.type.startsWith('image/')) {
                        return this.notify('請選擇圖片檔', 'error');
                    }
                    if (file.size > 10 * 1024 * 1024) {
                        return this.notify('檔案過大（請選 < 10MB 圖片）', 'error');
                    }
                    this.uploadingLogo = true;
                    try {
                        // LOGO 用 PNG 保留透明背景（quality 參數對 PNG 無效，傳 1.0）
                        let dataUrl = await this.resizeImagePng(file, 256);
                        if (dataUrl.length > 400 * 1024) {
                            dataUrl = await this.resizeImagePng(file, 192);
                        }
                        this.meta.schoolLogoUrl = dataUrl;
                        await update(ref(db, 'election/meta'), { schoolLogoUrl: dataUrl });
                        const sizeKb = Math.round(dataUrl.length / 1024);
                        this.notify(`✓ LOGO 已更新（${sizeKb} KB）`);
                    } catch (e) {
                        this.notify('上傳失敗：' + e.message, 'error');
                    } finally {
                        this.uploadingLogo = false;
                    }
                },
                resizeImagePng(file, maxDim) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onerror = () => reject(new Error('讀檔失敗'));
                        reader.onload = () => {
                            const img = new Image();
                            img.onerror = () => reject(new Error('圖片解析失敗'));
                            img.onload = () => {
                                let { width, height } = img;
                                if (width > height) {
                                    if (width > maxDim) { height *= maxDim / width; width = maxDim; }
                                } else {
                                    if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                                }
                                const canvas = document.createElement('canvas');
                                canvas.width = Math.round(width);
                                canvas.height = Math.round(height);
                                const ctx = canvas.getContext('2d');
                                ctx.imageSmoothingQuality = 'high';
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                resolve(canvas.toDataURL('image/png'));
                            };
                            img.src = reader.result;
                        };
                        reader.readAsDataURL(file);
                    });
                },

                // 設定相對時間（從現在 +N 分鐘），轉成 datetime-local 字串
                setOpenAtRelative(minutes) {
                    const t = new Date(Date.now() + minutes * 60 * 1000);
                    // 補 0 並組成 yyyy-MM-ddTHH:mm（datetime-local 格式）
                    const pad = n => String(n).padStart(2, '0');
                    this.meta.openAt = `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}T${pad(t.getHours())}:${pad(t.getMinutes())}`;
                    this.saveMeta();
                },

                async saveOneCandidate(c) {
                    await set(ref(db, `election/candidates/${c.id}`), {
                        id: c.id,
                        name: c.name || '',
                        imageUrl: c.imageUrl || '',
                        votes: Number(c.votes) || 0,
                        bio: c.bio || '',
                        policies: c.policies || '',
                        videoUrl: c.videoUrl || ''
                    });
                    this.notify(`已儲存 ${c.id} 號 ${c.name}`);
                },

                // 上傳照片：縮圖到 400px JPEG → base64 → 直接寫入 RTDB imageUrl
                async uploadPhoto(c, event) {
                    const input = event.target;
                    const file = input.files && input.files[0];
                    input.value = ''; // 清掉 input 讓同檔案能再選
                    if (!file) return;

                    if (!file.type.startsWith('image/')) {
                        return this.notify('請選擇圖片檔', 'error');
                    }
                    // 限制原始檔 < 15MB（縮完會剩 ~80KB）
                    if (file.size > 15 * 1024 * 1024) {
                        return this.notify('檔案過大（請選 < 15MB 圖片）', 'error');
                    }

                    this.uploadingId = c.id;
                    try {
                        const dataUrl = await this.resizeImage(file, 400, 0.85);
                        // 太大 → 再降 quality
                        let final = dataUrl;
                        if (final.length > 800 * 1024) {
                            final = await this.resizeImage(file, 360, 0.75);
                        }
                        if (final.length > 800 * 1024) {
                            final = await this.resizeImage(file, 320, 0.65);
                        }

                        c.imageUrl = final;
                        // 自動寫入 RTDB
                        await set(ref(db, `election/candidates/${c.id}`), {
                            id: c.id,
                            name: c.name || '',
                            imageUrl: final,
                            votes: Number(c.votes) || 0,
                            bio: c.bio || '',
                            policies: c.policies || '',
                            videoUrl: c.videoUrl || ''
                        });
                        const sizeKb = Math.round(final.length / 1024);
                        this.notify(`✓ ${c.id} 號 ${c.name} 照片已更新（${sizeKb} KB）`);
                    } catch (e) {
                        this.notify('上傳失敗：' + e.message, 'error');
                    } finally {
                        this.uploadingId = null;
                    }
                },

                // Canvas 縮圖：等比例縮到 maxDim，輸出 JPEG dataURL
                resizeImage(file, maxDim, quality) {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onerror = () => reject(new Error('讀檔失敗'));
                        reader.onload = () => {
                            const img = new Image();
                            img.onerror = () => reject(new Error('圖片解析失敗'));
                            img.onload = () => {
                                let { width, height } = img;
                                if (width > height) {
                                    if (width > maxDim) { height *= maxDim / width; width = maxDim; }
                                } else {
                                    if (height > maxDim) { width *= maxDim / height; height = maxDim; }
                                }
                                const canvas = document.createElement('canvas');
                                canvas.width = Math.round(width);
                                canvas.height = Math.round(height);
                                const ctx = canvas.getContext('2d');
                                ctx.imageSmoothingQuality = 'high';
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                resolve(canvas.toDataURL('image/jpeg', quality));
                            };
                            img.src = reader.result;
                        };
                        reader.readAsDataURL(file);
                    });
                },

                async addCandidate() {
                    const ids = this.candidates.map(c => c.id);
                    let newId = 1;
                    while (ids.includes(newId)) newId++;
                    await set(ref(db, `election/candidates/${newId}`), {
                        id: newId, name: `候選人 ${newId}`, imageUrl: '', votes: 0
                    });
                    this.notify(`已新增 ${newId} 號`);
                },

                async removeCandidate(id) {
                    if (!confirm(`確定刪除 ${id} 號？此候選人的票數也會一併刪除。`)) return;
                    await remove(ref(db, `election/candidates/${id}`));
                    this.notify(`已刪除 ${id} 號`);
                },

                async restoreDefaults(silent = false) {
                    if (!silent && !confirm('還原為預設 6 位候選人？目前所有資料（含票數）會被覆蓋。')) return;
                    const data = {};
                    for (const c of DEFAULT_CANDIDATES) {
                        data[c.id] = {
                            id: c.id,
                            name: c.name,
                            imageUrl: c.imageUrl,
                            votes: 0,
                            bio: c.bio || '',
                            policies: c.policies || '',
                            videoUrl: c.videoUrl || ''
                        };
                    }
                    await set(ref(db, 'election/candidates'), data);
                    if (!silent) this.notify('已還原為預設候選人');
                },

                notify(msg, type = 'success') {
                    this.toast = { show: true, msg, type };
                    clearTimeout(this._toastT);
                    this._toastT = setTimeout(() => { this.toast.show = false; }, 2200);
                },

                toggleMute() {
                    if (window.lmSound) this.muted = window.lmSound.toggle();
                    else this.muted = !this.muted;
                    this.notify(this.muted ? '🔇 已靜音' : '🔊 音效已開');
                    if (!this.muted && window.lmSound) window.lmSound.voteAdd();
                },

                exportCSV() {
                    if (this.candidates.length === 0) return this.notify('沒有資料可匯出', 'error');
                    const total = this.totalVotes;

                    // dense ranking 算名次
                    const distinct = [...new Set(
                        this.candidates.filter(c => c.votes > 0).map(c => c.votes)
                    )].sort((a, b) => b - a);
                    const rankOf = c => c.votes === 0 ? null : distinct.indexOf(c.votes) + 1;

                    // 排序：票數高→低，相同則 id 小→大
                    const sorted = [...this.candidates].sort((a, b) => {
                        if (b.votes !== a.votes) return b.votes - a.votes;
                        return a.id - b.id;
                    });

                    const ts = new Date();
                    const pad = n => String(n).padStart(2, '0');
                    const tsStr = `${ts.getFullYear()}-${pad(ts.getMonth()+1)}-${pad(ts.getDate())} ${pad(ts.getHours())}:${pad(ts.getMinutes())}:${pad(ts.getSeconds())}`;

                    // CSV escape：包含 , " 換行的欄位要用 "" 包，內部 " 變 ""
                    const esc = v => {
                        const s = String(v ?? '');
                        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
                    };

                    const lines = [];
                    lines.push(esc(this.meta.title || '選舉結果'));
                    lines.push(`匯出時間,${tsStr}`);
                    lines.push(`總票數,${total}`);
                    lines.push(`計票狀態,${this.meta.locked ? '已封存' : '計票中'}`);
                    lines.push('');
                    lines.push('排名,號碼,姓名,得票數,得票率');
                    for (const c of sorted) {
                        const r = rankOf(c);
                        const pct = total > 0 ? (c.votes * 100 / total).toFixed(1) + '%' : '0.0%';
                        lines.push([
                            r === null ? '—' : r,
                            c.id,
                            esc(c.name),
                            c.votes,
                            pct
                        ].join(','));
                    }

                    // BOM ﻿ 讓 Excel 用 UTF-8 開
                    const csv = '﻿' + lines.join('\r\n');
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `小市長選舉結果_${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}${pad(ts.getSeconds())}.csv`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);

                    this.notify('✓ CSV 已下載');
                },

                async exportScreenshot() {
                    if (typeof html2canvas !== 'function') {
                        return this.notify('截圖工具尚未載入，請稍後再試', 'error');
                    }
                    const target = document.getElementById('screenshot-area');
                    if (!target) return this.notify('找不到截圖區域', 'error');

                    this.busyShot = true;
                    try {
                        // 等字型載入完成（避免中文字變方框）
                        if (document.fonts && document.fonts.ready) {
                            await document.fonts.ready;
                        }

                        // 取得實際元素尺寸（不要用 scrollWidth/Height，可能會大於 viewport）
                        const rect = target.getBoundingClientRect();
                        const w = Math.ceil(rect.width);
                        const h = Math.ceil(rect.height);

                        const canvas = await html2canvas(target, {
                            backgroundColor: '#f1f5f9',
                            scale: 2,           // 兩倍解析
                            useCORS: true,
                            allowTaint: true,
                            logging: false,
                            width: w,
                            height: h,
                            windowWidth: w,
                            windowHeight: h,
                            // 在 cloned document 強制使用系統中文字型，避免 tofu
                            onclone: (clonedDoc) => {
                                const style = clonedDoc.createElement('style');
                                style.textContent = `
                                    * {
                                        font-family: "Microsoft JhengHei", "Microsoft JhengHei UI",
                                                     "PingFang TC", "Heiti TC",
                                                     "Noto Sans TC", "Noto Sans CJK TC",
                                                     system-ui, -apple-system, sans-serif !important;
                                    }
                                    /* Font Awesome 不可被覆寫 */
                                    .fa, .fas, .far, .fab, .fa-solid, .fa-regular, .fa-brands,
                                    [class^="fa-"], [class*=" fa-"] {
                                        font-family: "Font Awesome 6 Free", "Font Awesome 6 Brands" !important;
                                    }
                                    /* 隱藏 version tag */
                                    #lm-version-tag { display: none !important; }
                                    /* 防止 hover transform 影響截圖 */
                                    .card-elev:hover, .vote-btn:hover { transform: none !important; }
                                `;
                                clonedDoc.head.appendChild(style);
                            }
                        });
                        const ts = new Date();
                        const pad = n => String(n).padStart(2, '0');
                        const fname = `小市長選舉截圖_${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}${pad(ts.getSeconds())}.png`;
                        canvas.toBlob((blob) => {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = fname;
                            document.body.appendChild(a);
                            a.click();
                            a.remove();
                            URL.revokeObjectURL(url);
                            this.notify('✓ 截圖已下載');
                        }, 'image/png');
                    } catch (e) {
                        this.notify('截圖失敗：' + e.message, 'error');
                    } finally {
                        this.busyShot = false;
                    }
                },

                // 開啟時間軸 modal：從 RTDB log 取資料 → 用 Chart.js 畫
                async openTimeline() {
                    this.timelineOpen = true;
                    if (typeof Chart === 'undefined') {
                        return this.notify('Chart.js 尚未載入，請稍後再試', 'error');
                    }
                    // 一次性抓 log（單向；real-time 不必要因為這是分析用）
                    const { onValue, off } = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js");
                    const logRef = ref(db, 'election/log');
                    onValue(logRef, (snap) => {
                        const v = snap.val() || {};
                        const arr = Object.values(v)
                            .filter(e => e && e.action === 'vote' && Number.isFinite(Number(e.ts)))
                            .map(e => ({ ts: Number(e.ts), id: Number(e.id), delta: Number(e.delta) || 0 }))
                            .sort((a, b) => a.ts - b.ts);
                        this.timelineLog = arr;

                        if (arr.length > 0) {
                            const f = new Date(arr[0].ts);
                            const l = new Date(arr[arr.length - 1].ts);
                            const fmt = d => {
                                const p = n => String(n).padStart(2, '0');
                                return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
                            };
                            this.timelineFirstAt = fmt(f);
                            this.timelineLastAt = fmt(l);
                        }

                        this.$nextTick(() => this.renderTimeline());
                    }, { onlyOnce: true });
                },

                renderTimeline() {
                    if (this.timelineLog.length === 0) return;
                    const canvas = document.getElementById('timeline-chart');
                    if (!canvas) return;

                    // 1. 計算時間軸 bin（每分鐘一格，或視範圍動態切）
                    const startMs = this.timelineLog[0].ts;
                    const endMs = this.timelineLog[this.timelineLog.length - 1].ts;
                    const rangeMs = endMs - startMs;
                    // 動態 bin：< 5 分 → 10 秒；< 30 分 → 30 秒；其他 → 1 分鐘
                    const binMs = rangeMs < 5 * 60 * 1000 ? 10 * 1000
                                : rangeMs < 30 * 60 * 1000 ? 30 * 1000
                                : 60 * 1000;
                    const startBin = Math.floor(startMs / binMs) * binMs;
                    const endBin   = Math.floor(endMs   / binMs) * binMs;
                    const labels = [];
                    for (let t = startBin; t <= endBin; t += binMs) labels.push(t);

                    // 2. 對每位候選人計算累積票數
                    const colors = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
                    const sortedCs = [...this.candidates].sort((a, b) => a.id - b.id);
                    const datasets = sortedCs.map((c, idx) => {
                        // 對每個 bin，累積到 binEnd 為止這位候選人的票數
                        let cum = 0;
                        let liIdx = 0;
                        const data = labels.map(binStart => {
                            const binEnd = binStart + binMs;
                            while (liIdx < this.timelineLog.length && this.timelineLog[liIdx].ts < binEnd) {
                                if (this.timelineLog[liIdx].id === c.id) {
                                    cum += this.timelineLog[liIdx].delta;
                                }
                                liIdx++;
                            }
                            return cum;
                        });
                        return {
                            label: `${c.id}號 ${c.name}`,
                            data,
                            borderColor: colors[idx % colors.length],
                            backgroundColor: colors[idx % colors.length] + '20',
                            borderWidth: 2,
                            tension: 0.1,
                            pointRadius: 0,
                            pointHoverRadius: 5
                        };
                    });

                    // 銷毀舊圖表（重複開啟時）
                    if (this._timelineChart) {
                        this._timelineChart.destroy();
                    }

                    this._timelineChart = new Chart(canvas, {
                        type: 'line',
                        data: {
                            labels: labels.map(t => {
                                const d = new Date(t);
                                const p = n => String(n).padStart(2, '0');
                                return rangeMs < 5 * 60 * 1000
                                    ? `${p(d.getMinutes())}:${p(d.getSeconds())}`
                                    : `${p(d.getHours())}:${p(d.getMinutes())}`;
                            }),
                            datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                legend: { position: 'top', labels: { font: { size: 12 } } },
                                tooltip: {
                                    callbacks: {
                                        label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y} 票`
                                    }
                                }
                            },
                            scales: {
                                x: { title: { display: true, text: '時間' } },
                                y: { title: { display: true, text: '累積票數' }, beginAtZero: true, ticks: { stepSize: 1, precision: 0 } }
                            }
                        }
                    });
                }
            };
        };
    </script>
