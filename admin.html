<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台唱票｜石門國小自治市市長選舉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
    <style>
        body { font-family: 'Noto Sans TC', system-ui, -apple-system, "Microsoft JhengHei", sans-serif; }
        [x-cloak] { display: none !important; }

        /* 按鈕互動 */
        .vote-btn { transition: transform .12s, box-shadow .12s; }
        .vote-btn:active { transform: scale(0.93); }
        .vote-btn-add:hover { box-shadow: 0 8px 20px rgba(37,99,235,.4); }

        /* 票數數字跳動 + 變色 */
        @keyframes num-pop {
            0%   { transform: scale(1);    color: #1e293b; text-shadow: none; }
            40%  { transform: scale(1.45); color: #16a34a; text-shadow: 0 4px 24px rgba(22,163,74,.5); }
            100% { transform: scale(1);    color: #1e293b; text-shadow: none; }
        }
        .num-pop { animation: num-pop .55s cubic-bezier(.4,0,.2,1); }

        /* 卡片光暈（+1 後） */
        @keyframes card-flash {
            0%   { box-shadow: 0 0 0 0   rgba(37,99,235,0); }
            30%  { box-shadow: 0 0 0 12px rgba(37,99,235,.45); }
            100% { box-shadow: 0 0 0 0   rgba(37,99,235,0); }
        }
        .card-flash { animation: card-flash .9s ease-out; }

        /* 卡片 -1 用紅色 */
        @keyframes card-flash-minus {
            0%   { box-shadow: 0 0 0 0   rgba(239,68,68,0); }
            30%  { box-shadow: 0 0 0 12px rgba(239,68,68,.45); }
            100% { box-shadow: 0 0 0 0   rgba(239,68,68,0); }
        }
        .card-flash-minus { animation: card-flash-minus .9s ease-out; }

        /* +1 飄字 */
        @keyframes float-up {
            0%   { transform: translate(-50%, 0)     scale(1);   opacity: 1; }
            100% { transform: translate(-50%, -90px) scale(1.6); opacity: 0; }
        }
        .float-plus {
            position: absolute; left: 50%; top: 50%;
            color: #16a34a; font-size: 36px; font-weight: 900;
            text-shadow: 0 2px 12px rgba(22,163,74,.5);
            pointer-events: none; z-index: 30;
            animation: float-up 1.1s cubic-bezier(.4,0,.2,1) forwards;
        }
        .float-minus {
            position: absolute; left: 50%; top: 50%;
            color: #ef4444; font-size: 32px; font-weight: 900;
            text-shadow: 0 2px 12px rgba(239,68,68,.5);
            pointer-events: none; z-index: 30;
            animation: float-up 1.1s cubic-bezier(.4,0,.2,1) forwards;
        }

        /* 按鈕 ripple 點擊波紋 */
        @keyframes ripple {
            0%   { transform: scale(0);   opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,.7);
            pointer-events: none;
            animation: ripple .6s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col" x-data="adminApp()" x-init="init()" x-cloak>

    <!-- ========== 登入畫面 ========== -->
    <div x-show="authState === 'signed_out'"
         class="flex-grow flex items-center justify-center px-4 py-10">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-rose-400 to-rose-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
                    <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">後台唱票系統</h1>
                <p class="text-slate-500 text-sm mt-1">請使用教師帳號登入</p>
            </div>

            <form @submit.prevent="signIn()" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">電子郵件</label>
                    <input type="email" x-model="loginEmail" required autocomplete="username"
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">密碼</label>
                    <input type="password" x-model="loginPassword" required autocomplete="current-password"
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                </div>

                <div x-show="loginError" class="bg-rose-50 border border-rose-200 text-rose-700 text-sm px-4 py-2 rounded-lg" x-text="loginError"></div>

                <button type="submit" :disabled="loginBusy"
                        class="w-full bg-rose-600 hover:bg-rose-700 disabled:bg-slate-400 text-white font-bold py-3 rounded-lg shadow-md transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-right-to-bracket" x-show="!loginBusy"></i>
                    <i class="fa-solid fa-circle-notch fa-spin" x-show="loginBusy"></i>
                    <span x-text="loginBusy ? '驗證中...' : '登入'"></span>
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-slate-200 text-xs text-slate-500 text-center space-y-1">
                <p>帳號需事前由管理員在 Firebase Console 建立</p>
                <a href="index.html" class="text-rose-600 hover:underline inline-block mt-2">
                    <i class="fa-solid fa-arrow-left mr-1"></i> 回主頁
                </a>
            </div>
        </div>
    </div>

    <!-- ========== 已登入：唱票主畫面 ========== -->
    <template x-if="authState === 'signed_in'">
        <div class="flex flex-col flex-grow">

            <!-- 頂部列 -->
            <header class="bg-gradient-to-r from-rose-700 to-rose-900 text-white shadow-lg sticky top-0 z-20">
                <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
                    <div>
                        <h1 class="text-lg md:text-xl font-bold flex items-center gap-2">
                            <i class="fa-solid fa-shield-halved"></i>
                            後台唱票系統
                        </h1>
                        <p class="text-rose-100 text-xs" x-text="meta.title"></p>
                    </div>

                    <div class="flex items-center gap-2">
                        <!-- 鎖定狀態 -->
                        <button @click="toggleLock()"
                                :class="meta.locked ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-500 hover:bg-emerald-600'"
                                class="text-white text-sm px-3 py-1.5 rounded-lg flex items-center gap-1.5 font-medium">
                            <i class="fa-solid" :class="meta.locked ? 'fa-lock' : 'fa-lock-open'"></i>
                            <span x-text="meta.locked ? '已封存' : '計票中'"></span>
                        </button>

                        <!-- 連線指示 -->
                        <div class="flex items-center gap-1.5 bg-white/15 backdrop-blur px-3 py-1.5 rounded-lg text-sm">
                            <span class="w-2 h-2 rounded-full" :class="connected ? 'bg-emerald-300' : 'bg-rose-300'"></span>
                            <span x-text="connected ? '已連線' : '中斷'"></span>
                        </div>

                        <button @click="signOut()"
                                class="bg-white/15 hover:bg-white/25 text-white text-sm px-3 py-1.5 rounded-lg">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i> 登出
                        </button>
                    </div>
                </div>

                <!-- 分頁切換 -->
                <div class="max-w-7xl mx-auto px-4 flex gap-1">
                    <button @click="tab = 'count'"
                            :class="tab === 'count' ? 'bg-white/20 border-white' : 'border-transparent hover:bg-white/10'"
                            class="px-4 py-2 border-b-2 text-sm font-medium transition-colors">
                        <i class="fa-solid fa-square-check mr-1"></i> 唱票
                    </button>
                    <button @click="tab = 'settings'"
                            :class="tab === 'settings' ? 'bg-white/20 border-white' : 'border-transparent hover:bg-white/10'"
                            class="px-4 py-2 border-b-2 text-sm font-medium transition-colors">
                        <i class="fa-solid fa-gear mr-1"></i> 設定
                    </button>
                </div>
            </header>

            <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-6">

                <!-- ============= 唱票分頁 ============= -->
                <div x-show="tab === 'count'">

                    <!-- 統計列 -->
                    <div class="bg-white rounded-xl shadow-sm p-4 mb-5 flex flex-wrap items-center justify-between gap-4">
                        <div class="flex items-center gap-6">
                            <div>
                                <div class="text-xs text-slate-500 font-medium uppercase tracking-wider">總票數</div>
                                <div class="text-3xl font-black text-slate-800 tabular-nums" x-text="totalVotes"></div>
                            </div>
                            <div class="w-px h-10 bg-slate-200"></div>
                            <div>
                                <div class="text-xs text-slate-500 font-medium uppercase tracking-wider">最高票</div>
                                <div class="text-3xl font-black text-blue-600 tabular-nums" x-text="maxVotes"></div>
                            </div>
                        </div>

                        <div class="flex gap-2">
                            <button @click="undoLast()" :disabled="!lastAction || busy"
                                    class="bg-slate-200 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed text-slate-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1.5">
                                <i class="fa-solid fa-rotate-left"></i> 復原上次
                            </button>
                            <button @click="resetVotes()" :disabled="busy"
                                    class="bg-slate-200 hover:bg-rose-100 hover:text-rose-700 text-slate-700 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1.5">
                                <i class="fa-solid fa-arrows-rotate"></i> 票數歸零
                            </button>
                        </div>
                    </div>

                    <!-- 鎖定提示 -->
                    <div x-show="meta.locked" class="bg-amber-50 border border-amber-200 text-amber-800 p-4 rounded-xl mb-5 text-sm flex items-start gap-2">
                        <i class="fa-solid fa-lock mt-0.5"></i>
                        <span>計票已封存，無法繼續加票。如需修正請點右上角解鎖。</span>
                    </div>

                    <!-- 候選人卡片 -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                        <template x-for="c in sortedCandidates" :key="c.id">
                            <div class="bg-white rounded-2xl shadow-md overflow-hidden flex flex-col relative"
                                 :id="'admin-card-'+c.id">

                                <!-- 卡頭：號碼 + 姓名 + 照片 -->
                                <div class="relative bg-gradient-to-b from-slate-50 to-white p-4 border-b border-slate-100">
                                    <div class="absolute top-3 left-3 z-10 bg-gradient-to-br from-blue-500 to-blue-700 text-white px-3 py-1.5 rounded-xl shadow-lg ring-2 ring-white flex items-baseline gap-0.5">
                                        <span class="text-2xl font-black leading-none tabular-nums" x-text="c.id"></span>
                                        <span class="text-xs font-bold opacity-90">號</span>
                                    </div>
                                    <div class="flex flex-col items-center pt-4">
                                        <div class="w-20 h-20 rounded-full overflow-hidden bg-slate-200 border-4 border-white shadow-md mb-2">
                                            <template x-if="c.imageUrl">
                                                <img :src="c.imageUrl" :alt="c.name" class="w-full h-full object-cover" @error="$el.style.display='none'">
                                            </template>
                                            <template x-if="!c.imageUrl">
                                                <div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-user text-slate-400 text-3xl"></i></div>
                                            </template>
                                        </div>
                                        <h3 class="text-lg font-bold text-slate-800" x-text="c.name"></h3>
                                    </div>
                                </div>

                                <!-- 票數 + 按鈕 -->
                                <div class="p-5 flex flex-col gap-4">
                                    <div class="text-center">
                                        <div class="text-xs text-slate-500 uppercase tracking-wider mb-1">目前得票</div>
                                        <div class="text-5xl font-black text-slate-800 tabular-nums" :id="'cnt-'+c.id" x-text="c.votes"></div>
                                    </div>

                                    <div class="flex gap-2">
                                        <button @click="changeVote(c.id, -1, $event)"
                                                :disabled="c.votes === 0 || meta.locked || busy"
                                                class="vote-btn relative overflow-hidden w-14 h-14 rounded-xl bg-slate-200 hover:bg-slate-300 text-slate-700 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center text-xl shadow-sm"
                                                title="減少一票（修正）">
                                            <i class="fa-solid fa-minus pointer-events-none"></i>
                                        </button>
                                        <button @click="changeVote(c.id, +1, $event)"
                                                :disabled="meta.locked || busy"
                                                class="vote-btn vote-btn-add relative overflow-hidden flex-grow h-14 rounded-xl bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 disabled:cursor-not-allowed text-white text-xl font-bold shadow-md flex items-center justify-center gap-2">
                                            <i class="fa-solid fa-plus pointer-events-none"></i><span class="pointer-events-none">加 1 票</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- ============= 設定分頁 ============= -->
                <div x-show="tab === 'settings'" class="space-y-6">

                    <!-- 活動資訊 -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                        <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b pb-3 border-slate-100">
                            <i class="fa-solid fa-flag text-rose-500"></i> 活動資訊
                        </h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">活動主標題</label>
                                <input type="text" x-model="meta.title" @change="saveMeta()"
                                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">副標題</label>
                                <input type="text" x-model="meta.subtitle" @change="saveMeta()"
                                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                            </div>
                        </div>
                    </div>

                    <!-- 候選人管理 -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                        <div class="flex justify-between items-center mb-4 border-b pb-3 border-slate-100">
                            <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                                <i class="fa-solid fa-users text-rose-500"></i> 候選人列表
                            </h2>
                            <button @click="addCandidate()"
                                    class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-1.5">
                                <i class="fa-solid fa-plus"></i> 新增
                            </button>
                        </div>

                        <div class="space-y-3">
                            <template x-for="(c, idx) in candidates" :key="c.id">
                                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 flex flex-col md:flex-row gap-3 items-start md:items-center">
                                    <div class="flex-shrink-0 w-12 h-12 rounded-full bg-blue-100 text-blue-700 font-bold flex items-center justify-center text-lg" x-text="c.id"></div>

                                    <div class="flex-shrink-0 w-14 h-14 rounded-full overflow-hidden bg-slate-200 border-2 border-white shadow-sm">
                                        <template x-if="c.imageUrl">
                                            <img :src="c.imageUrl" :alt="c.name" class="w-full h-full object-cover" @error="$el.style.display='none'">
                                        </template>
                                        <template x-if="!c.imageUrl">
                                            <div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-user text-slate-400 text-xl"></i></div>
                                        </template>
                                    </div>

                                    <div class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-3 w-full">
                                        <input type="text" x-model="c.name" placeholder="姓名"
                                               class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                                        <input type="text" x-model="c.imageUrl" placeholder="照片網址或路徑（如 assets/photos/1.jpg）"
                                               class="px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-rose-500 focus:border-rose-500 outline-none">
                                    </div>

                                    <div class="flex gap-2 w-full md:w-auto">
                                        <button @click="saveOneCandidate(c)"
                                                class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-medium" title="儲存此候選人">
                                            <i class="fa-solid fa-floppy-disk"></i>
                                        </button>
                                        <button @click="removeCandidate(c.id)"
                                                class="bg-rose-100 hover:bg-rose-200 text-rose-700 px-3 py-2 rounded-lg text-sm font-medium" title="刪除">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </template>

                            <div x-show="candidates.length === 0" class="text-center py-10 text-slate-500 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                                <i class="fa-solid fa-user-xmark text-3xl mb-2 text-slate-400"></i>
                                <p>目前沒有候選人</p>
                            </div>
                        </div>
                    </div>

                    <!-- 危險區 -->
                    <div class="bg-white rounded-xl shadow-sm p-6 border border-rose-200">
                        <h2 class="text-lg font-bold text-rose-700 mb-4 flex items-center gap-2 border-b pb-3 border-rose-100">
                            <i class="fa-solid fa-triangle-exclamation"></i> 危險操作區
                        </h2>
                        <div class="space-y-3">
                            <button @click="restoreDefaults()"
                                    class="w-full bg-amber-100 hover:bg-amber-200 text-amber-800 py-3 rounded-lg font-medium">
                                <i class="fa-solid fa-rotate-right mr-2"></i>
                                還原為預設候選人（吳乃暄、張麒勳、李芯妮、邱芃禕、鄒宗志、曾秝豪）
                            </button>
                            <button @click="resetVotes()"
                                    class="w-full bg-rose-100 hover:bg-rose-200 text-rose-800 py-3 rounded-lg font-medium">
                                <i class="fa-solid fa-arrows-rotate mr-2"></i>
                                所有候選人票數歸零
                            </button>
                        </div>
                    </div>
                </div>
            </main>

            <footer class="bg-slate-800 text-slate-400 py-4">
                <div class="max-w-7xl mx-auto px-4 text-center text-sm">
                    <p>
                        Made with <span class="text-red-400">❤</span> by
                        <a href="https://www.smes.tyc.edu.tw/" target="_blank" rel="noopener" class="text-slate-200 hover:text-white underline">阿凱老師</a>
                        &nbsp;|&nbsp; © <span x-text="new Date().getFullYear()"></span> 石門國小
                    </p>
                </div>
            </footer>
        </div>
    </template>

    <!-- Toast -->
    <div x-show="toast.show" x-transition class="fixed bottom-6 right-6 z-50">
        <div :class="toast.type === 'error' ? 'bg-rose-600' : 'bg-emerald-600'"
             class="text-white px-5 py-3 rounded-lg shadow-2xl flex items-center gap-2 font-medium">
            <i class="fa-solid" :class="toast.type === 'error' ? 'fa-circle-exclamation' : 'fa-check-circle'"></i>
            <span x-text="toast.msg"></span>
        </div>
    </div>

    <!-- Module 必須在 Alpine 之前載入並設定 window.adminApp。
         不可用 top-level await，否則 module yield 時 Alpine 會先跑而找不到 adminApp。 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import {
            getAuth, signInWithEmailAndPassword, signOut as fbSignOut,
            onAuthStateChanged, setPersistence, browserLocalPersistence
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        import {
            getDatabase, ref, onValue, set, update, runTransaction, remove, push
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
        import { firebaseConfig, DEFAULT_CANDIDATES, DEFAULT_META } from "./firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        // setPersistence 改成 fire-and-forget，避免 top-level await 阻塞 window.adminApp 註冊
        setPersistence(auth, browserLocalPersistence).catch(e => console.warn('[Auth] setPersistence', e));

        window.adminApp = function () {
            return {
                authState: 'loading', // loading | signed_out | signed_in
                user: null,

                loginEmail: '',
                loginPassword: '',
                loginError: '',
                loginBusy: false,

                tab: 'count',
                candidates: [],
                meta: { ...DEFAULT_META },
                connected: false,
                busy: false,
                lastAction: null, // {type:'add'|'sub', id, by}

                toast: { show: false, msg: '', type: 'success' },

                init() {
                    onAuthStateChanged(auth, (u) => {
                        if (u) {
                            this.user = u;
                            this.authState = 'signed_in';
                            this.bindData();
                        } else {
                            this.user = null;
                            this.authState = 'signed_out';
                        }
                    });
                },

                async signIn() {
                    this.loginBusy = true;
                    this.loginError = '';
                    try {
                        await signInWithEmailAndPassword(auth, this.loginEmail.trim(), this.loginPassword);
                        this.loginPassword = '';
                    } catch (e) {
                        const map = {
                            'auth/invalid-credential': '帳號或密碼錯誤',
                            'auth/invalid-email': 'Email 格式錯誤',
                            'auth/user-not-found': '此帳號不存在',
                            'auth/wrong-password': '密碼錯誤',
                            'auth/too-many-requests': '錯誤次數過多，請稍後再試',
                            'auth/network-request-failed': '網路錯誤'
                        };
                        this.loginError = map[e.code] || ('登入失敗：' + (e.code || e.message));
                    } finally {
                        this.loginBusy = false;
                    }
                },

                async signOut() {
                    if (!confirm('確定要登出嗎？')) return;
                    await fbSignOut(auth);
                },

                bindData() {
                    onValue(ref(db, '.info/connected'), s => this.connected = s.val() === true);

                    onValue(ref(db, 'election/candidates'), async (snap) => {
                        const v = snap.val();
                        if (!v) {
                            // 第一次使用：寫入預設值
                            await this.restoreDefaults(true);
                            return;
                        }
                        this.candidates = Object.values(v).map(c => ({
                            id: Number(c.id),
                            name: c.name || '',
                            imageUrl: c.imageUrl || '',
                            votes: Number(c.votes) || 0
                        })).sort((a, b) => a.id - b.id);
                    });

                    onValue(ref(db, 'election/meta'), (snap) => {
                        const v = snap.val();
                        if (!v) {
                            set(ref(db, 'election/meta'), { ...DEFAULT_META });
                        } else {
                            this.meta = { ...DEFAULT_META, ...v };
                        }
                    });
                },

                get totalVotes() { return this.candidates.reduce((s, c) => s + c.votes, 0); },
                get maxVotes() { return this.candidates.length ? Math.max(...this.candidates.map(c => c.votes)) : 0; },
                get sortedCandidates() {
                    return [...this.candidates].sort((a, b) => a.id - b.id);
                },

                async changeVote(id, delta, event) {
                    if (this.meta.locked) return this.notify('計票已封存', 'error');
                    if (this.busy) return;
                    this.busy = true;

                    // 立刻觸發按鈕特效，不等網路
                    if (event) this.spawnRipple(event);
                    this.spawnFloatLabel(id, delta);

                    try {
                        await runTransaction(ref(db, `election/candidates/${id}/votes`), (cur) => {
                            const n = (cur || 0) + delta;
                            return n < 0 ? 0 : n;
                        });
                        this.lastAction = { type: delta > 0 ? 'add' : 'sub', id, by: delta };
                        await push(ref(db, 'election/log'), {
                            ts: Date.now(), action: 'vote', id, delta, by: this.user.email
                        }).catch(() => {});
                        this.bumpCard(id, delta);
                    } catch (e) {
                        this.notify('寫入失敗：' + e.message, 'error');
                    } finally {
                        this.busy = false;
                    }
                },

                async undoLast() {
                    if (!this.lastAction) return;
                    const { id, by } = this.lastAction;
                    this.lastAction = null;
                    await this.changeVote(id, -by);
                    this.notify('已復原上一次操作');
                },

                // 按鈕點擊處 spawn ripple
                spawnRipple(event) {
                    const btn = event.currentTarget;
                    if (!btn) return;
                    const rect = btn.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = event.clientX - rect.left - size / 2;
                    const y = event.clientY - rect.top  - size / 2;
                    const r = document.createElement('span');
                    r.className = 'ripple';
                    r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
                    btn.appendChild(r);
                    setTimeout(() => r.remove(), 650);
                },

                // 卡片上飄出 +1 或 -1
                spawnFloatLabel(id, delta) {
                    const card = document.getElementById('admin-card-' + id);
                    if (!card) return;
                    const float = document.createElement('div');
                    float.className = delta > 0 ? 'float-plus' : 'float-minus';
                    float.textContent = (delta > 0 ? '+' : '') + delta;
                    card.appendChild(float);
                    setTimeout(() => float.remove(), 1150);
                },

                // 票數寫入成功後：數字跳動 + 卡片光暈
                bumpCard(id, delta) {
                    this.$nextTick(() => {
                        const num = document.getElementById('cnt-' + id);
                        if (num) {
                            num.classList.remove('num-pop');
                            void num.offsetWidth;
                            num.classList.add('num-pop');
                        }
                        const card = document.getElementById('admin-card-' + id);
                        if (card) {
                            const cls = delta > 0 ? 'card-flash' : 'card-flash-minus';
                            card.classList.remove('card-flash', 'card-flash-minus');
                            void card.offsetWidth;
                            card.classList.add(cls);
                        }
                    });
                },

                async toggleLock() {
                    const next = !this.meta.locked;
                    if (next && !confirm('確定要封存計票嗎？封存後將無法繼續加票。')) return;
                    if (!next && !confirm('確定要解除封存嗎？解除後可再次修改票數。')) return;
                    await update(ref(db, 'election/meta'), { locked: next });
                    this.notify(next ? '已封存計票' : '已解除封存');
                },

                async resetVotes() {
                    if (!confirm('確定要將所有候選人票數歸零嗎？此動作無法復原。')) return;
                    if (!confirm('再次確認：真的要歸零所有票數？')) return;
                    const updates = {};
                    for (const c of this.candidates) {
                        updates[`election/candidates/${c.id}/votes`] = 0;
                    }
                    await update(ref(db), updates);
                    this.lastAction = null;
                    this.notify('已將所有票數歸零');
                },

                async saveMeta() {
                    await update(ref(db, 'election/meta'), {
                        title: this.meta.title || '',
                        subtitle: this.meta.subtitle || '',
                        locked: !!this.meta.locked
                    });
                    this.notify('活動資訊已儲存');
                },

                async saveOneCandidate(c) {
                    await set(ref(db, `election/candidates/${c.id}`), {
                        id: c.id,
                        name: c.name || '',
                        imageUrl: c.imageUrl || '',
                        votes: Number(c.votes) || 0
                    });
                    this.notify(`已儲存 ${c.id} 號 ${c.name}`);
                },

                async addCandidate() {
                    const ids = this.candidates.map(c => c.id);
                    let newId = 1;
                    while (ids.includes(newId)) newId++;
                    await set(ref(db, `election/candidates/${newId}`), {
                        id: newId, name: `候選人 ${newId}`, imageUrl: '', votes: 0
                    });
                    this.notify(`已新增 ${newId} 號`);
                },

                async removeCandidate(id) {
                    if (!confirm(`確定刪除 ${id} 號？此候選人的票數也會一併刪除。`)) return;
                    await remove(ref(db, `election/candidates/${id}`));
                    this.notify(`已刪除 ${id} 號`);
                },

                async restoreDefaults(silent = false) {
                    if (!silent && !confirm('還原為預設 6 位候選人？目前所有資料（含票數）會被覆蓋。')) return;
                    const data = {};
                    for (const c of DEFAULT_CANDIDATES) {
                        data[c.id] = { id: c.id, name: c.name, imageUrl: c.imageUrl, votes: 0 };
                    }
                    await set(ref(db, 'election/candidates'), data);
                    if (!silent) this.notify('已還原為預設候選人');
                },

                notify(msg, type = 'success') {
                    this.toast = { show: true, msg, type };
                    clearTimeout(this._toastT);
                    this._toastT = setTimeout(() => { this.toast.show = false; }, 2200);
                }
            };
        };
    </script>

    <!-- Alpine 在 module 之後載入，確保 window.adminApp 已存在 -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
